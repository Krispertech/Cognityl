        <button onClick={()=>setOpen(!open)} aria-expanded={open} aria-label="Open menu"

        </button>
      </div>

      {open && (
        <div className="md:hidden bg-white border-b border-line">
          <div className="px-5 py-4 flex flex-col">

/* ══════════════════════════════════════════════════════
   SIGNATURE ELEMENT: a call that routes itself to the right location
   ══════════════════════════════════════════════════════ */
const SCRIPT = [
  {who:'ai',     text:'Thanks for calling Sunrise Auto Group. Which location works best for you — Columbus, Dayton, or Cincinnati?'},
  {who:'client', text:'Columbus, please.'},
  {who:'ai',     text:'Got it. What can we help you with today?'},
  {who:'client', text:'I need an oil change.'},
  {who:'ai',     text:'Our Columbus location has an opening tomorrow at 10:00 AM — does that work?'},
  {who:'client', text:'Yes, that works.'},
  {who:'ai',     text:"You're booked at Columbus for tomorrow, 10:00 AM. We'll text a confirmation."},
];

function LiveCall(){
  const reduce = typeof window !== "undefined" &&
    window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const [shown,setShown]   = useState(reduce ? SCRIPT.length : 0);
  const [typing,setTyping] = useState(false);
  const [booked,setBooked] = useState(reduce);
  const timers = useRef([]);

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };

  useEffect(()=>{
    if (reduce) return;

    const run = () => {
      clearTimers();
      setShown(0); setBooked(false); setTyping(true);

      let t = 900;
      SCRIPT.forEach((_, i) => {
        timers.current.push(setTimeout(()=>{
          setShown(i+1);
          setTyping(i < SCRIPT.length-1);
        }, t));
        t += 1400;
      });

      timers.current.push(setTimeout(()=>{ setTyping(false); setBooked(true); }, t));
      timers.current.push(setTimeout(run, t + 4500));
    };

    run();
    return clearTimers;
  },[reduce]);

  return (
    <div className="relative">
      <div className="relative mx-auto w-full max-w-[360px] rounded-[36px] bg-ink p-2.5 shadow-2xl shadow-ink/25">
        <div className="rounded-[28px] bg-white overflow-hidden">

          <div className="bg-ink text-white px-5 pt-4 pb-5">
            <div className="flex items-center justify-between text-[11px] font-mono text-white/45 mb-4">
              <span>9:41</span>
              <span className="flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-brand-bright"></span>
                COGNITYL AI
              </span>
            </div>
            <div className="flex items-center gap-3">
              <span className="w-11 h-11 rounded-full bg-brand grid place-items-center pulse-ring flex-shrink-0">
                <Icon name="phone" className="w-5 h-5 text-white"/>
              </span>
              <div className="leading-tight min-w-0">
                <p className="font-mono text-[13px] text-white/60">+1 (614) XXX-XXXX</p>
                <p className="text-[13px] font-semibold text-brand-bright">
                  {booked ? "Call complete · 0:41" : "AI is answering…"}
                </p>
              </div>
            </div>
          </div>

          <div className="px-4 py-4 bg-[#F7FAF8] min-h-[300px] flex flex-col gap-2.5" aria-live="polite">
            {SCRIPT.slice(0,shown).map((m,i)=>(
              <div key={i} className={`rise flex ${m.who==='ai' ? 'justify-start' : 'justify-end'}`}>
                <div className={`max-w-[85%] px-3.5 py-2.5 text-[13.5px] leading-snug rounded-2xl
                  ${m.who==='ai'
                    ? 'bg-white border border-line rounded-bl-md text-ink'
                    : 'bg-ink text-white rounded-br-md'}`}>
                  {m.text}
                </div>
              </div>
            ))}

            {typing && (
              <div className="flex justify-start">
                <div className="dots bg-white border border-line rounded-2xl rounded-bl-md px-4 py-3 flex gap-1 items-center">
                  <span></span><span></span><span></span>
                </div>
              </div>
            )}

            {booked && (
              <div className="rise mt-auto pt-2">
                <div className="rounded-2xl border-2 border-brand bg-brand-light/70 p-3.5">
                  <p className="flex items-center gap-2 text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold mb-2">
                    <Icon name="check" className="w-3.5 h-3.5"/> Appointment booked · Columbus
                  </p>
                  <p className="font-semibold text-[15px] text-ink">Oil change</p>
                  <p className="text-[13px] text-ink-muted">Tomorrow, 10:00 AM</p>
                  <p className="flex items-center gap-1.5 text-[12px] text-brand-dark font-medium mt-2 pt-2 border-t border-brand/25">
                    <Icon name="calendar" className="w-3.5 h-3.5"/> Synced to the Columbus location calendar
                  </p>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      <div className="hidden lg:flex absolute -left-6 top-[28%] items-center gap-2 rounded-full bg-white
        border border-line shadow-xl px-4 py-2.5">
        <Icon name="layers" className="w-4 h-4 text-brand-dark"/>
        <span className="text-[13px] font-semibold">Routes to the right location</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PROBLEM — loss calculator, scaled across locations
   ══════════════════════════════════════════════════════ */
function Problem(){
  const [locations,setLocations] = useState(15);
  const [calls,setCalls] = useState(4);     // missed calls per day, per location
  const [value,setValue] = useState(65);    // avg ticket value, USD

  const perDay   = locations * calls * value;
  const perMonth = perDay * 22;
  const perYear  = perMonth * 12;

  return (
    <section className="py-20 md:py-28 bg-ink text-white">
      <div className="max-w-6xl mx-auto px-5 lg:px-8">

        <div className="max-w-2xl">
          <p className="inline-flex items-center gap-2 text-[12px] font-mono uppercase tracking-[0.14em]
            text-loss-line mb-5">
            <Icon name="missed" className="w-4 h-4"/> Missed calls, across your network
          </p>
          <h2 className="display text-[34px] sm:text-[44px] leading-[1.06] font-extrabold">
            What is it costing you — across every location?
          </h2>
          <p className="mt-5 text-[17px] leading-relaxed text-white/65">
            A single missed call is easy to shrug off. Multiply it by every site, every day,
            and it becomes one of the largest, least visible line items in the business.
          </p>
        </div>

        <div className="mt-12 grid lg:grid-cols-[1fr_1fr] gap-6 items-stretch">

          <div className="rounded-3xl bg-white/[0.06] border border-white/10 p-6 sm:p-8">
            <p className="text-[12px] font-mono uppercase tracking-[0.12em] text-white/40 mb-7">
              Enter your numbers
            </p>

            <div className="mb-8">
              <label htmlFor="locations" className="flex items-baseline justify-between mb-3">
                <span className="text-[15px] font-medium text-white/85">Locations</span>
                <span className="font-mono text-[22px] font-semibold text-white">{locations}</span>
              </label>
              <input id="locations" type="range" min="1" max="60" value={locations}
                onChange={e=>setLocations(+e.target.value)} className="focus-ring"/>
            </div>

            <div className="mb-8">
              <label htmlFor="calls" className="flex items-baseline justify-between mb-3">
                <span className="text-[15px] font-medium text-white/85">Missed calls per location, per day</span>
                <span className="font-mono text-[22px] font-semibold text-white">{calls}</span>
              </label>
              <input id="calls" type="range" min="1" max="20" value={calls}
                onChange={e=>setCalls(+e.target.value)} className="focus-ring"/>
            </div>

            <div>
              <label htmlFor="value" className="flex items-baseline justify-between mb-3">
                <span className="text-[15px] font-medium text-white/85">Average ticket value</span>
                <span className="font-mono text-[22px] font-semibold text-white">{usd(value)}</span>
              </label>
              <input id="value" type="range" min="10" max="500" step="5" value={value}
                onChange={e=>setValue(+e.target.value)} className="focus-ring"/>
            </div>

            <p className="mt-7 pt-6 border-t border-white/10 font-mono text-[13px] text-white/55">
              {locations} locations × {calls} calls × {usd(value)} = <span className="text-loss-line font-semibold">{usd(perDay)}</span> per day
            </p>
          </div>

          <div className="rounded-3xl bg-loss-light border-2 border-loss p-6 sm:p-8 text-ink flex flex-col justify-center">
            <p className="text-[12px] font-mono uppercase tracking-[0.12em] text-loss font-semibold mb-2">
              Estimated impact
            </p>

            <p className="display text-[44px] sm:text-[58px] leading-none font-extrabold text-loss tabular-nums">
              {usd(perMonth)}
            </p>
            <p className="text-[15px] text-ink-muted mt-1">per month, across your network</p>

            <div className="mt-7 pt-6 border-t border-loss-line grid grid-cols-2 gap-4">
              <div>
                <p className="font-mono text-[24px] font-semibold text-ink tabular-nums">{usd(perDay)}</p>
                <p className="text-[13px] text-ink-muted">per day</p>
              </div>
              <div>
                <p className="font-mono text-[24px] font-semibold text-ink tabular-nums">{usd(perYear)}</p>
                <p className="text-[13px] text-ink-muted">per year</p>
              </div>
            </div>

            <p className="mt-6 text-[14px] leading-relaxed text-ink-muted">
              This is a directional estimate, not a quote — the real number depends on your
              current call volume and answer rate. We'll work it out together on a call.
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════
   HOW IT WORKS
   ══════════════════════════════════════════════════════ */
function HowItWorks(){
  const steps = [
    { icon:'phone',  title:'A customer calls',
      text:"Cognityl answers immediately, in the first seconds — no hold music, no routing tree." },
    { icon:'map',    title:'It identifies the right location',
      text:"For multi-site businesses, it asks which location the caller means (or reads it from caller ID / IVR data) and pulls that site's hours, services and pricing." },
    { icon:'calendar', title:'It books the appointment',
      text:"Checks that location's calendar — Google Calendar, Fresha, or another system you already use — and confirms the booking on the call. You get a notification." },
  ];

  return (
    <section id="how-it-works" className="py-20 md:py-28">
      <div className="max-w-6xl mx-auto px-5 lg:px-8">

        <div className="max-w-2xl mb-14">
          <p className="text-[12px] font-mono uppercase tracking-[0.14em] text-brand font-semibold mb-4">
            How it works
          </p>
          <h2 className="display text-[34px] sm:text-[44px] leading-[1.06] font-extrabold">
            One number, every location, no changes to your workflow.
          </h2>
          <p className="mt-5 text-[17px] text-ink-muted leading-relaxed">
            You keep your existing phone numbers and calendars. Cognityl sits in front of the call.
          </p>
        </div>

function StickyCallBar(){
  const [show,setShow] = useState(false);

  useEffect(()=>{
    const onScroll = () => setShow(window.scrollY > 420);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  },[]);

  return (
    <div className={`md:hidden fixed bottom-0 inset-x-0 z-50 p-3 bg-white/95 backdrop-blur border-t border-line
      transition-transform duration-300 ${show ? "translate-y-0" : "translate-y-full"}`}>
      <a href={callHref}
         onClick={(e)=>{ if(!hasPhone && window.cognitylOpenCallDemo){ e.preventDefault(); window.cognitylOpenCallDemo(); } }}
         className="flex items-center justify-center gap-2.5 w-full rounded-full bg-brand text-white

        <Icon name="phone" className="w-5 h-5"/>

    </div>
  );
}

function confirmationCard(d){const card=e('div','cog-card');const head=e('div','cog-card-head');head.append(e('div','cog-card-kicker','Demo request'),e('div','cog-card-title','Review your details'));const body=e('div','cog-card-body');const rows=[['Name',d.name],['Email',d.email],['Company',d.company],['Locations',d.locations],['Challenge',d.challenge],['Preferred time',d.preferredTime]];rows.forEach(([a,b])=>{const row=e('div','cog-card-row');row.append(e('div','cog-card-label',a),e('div','cog-card-value',b));body.append(row)});card.append(head,body,e('div','cog-card-note','After submission, Cognityl will reach out to confirm the exact time.'));log.append(card);log.scrollTop=log.scrollHeight;renderChips([TXT.yes,TXT.cancel])}
function successCard(){const box=e('div','cog-success');box.append(e('div','cog-success-title','✓ Request sent'),e('div','cog-success-text','Thanks! Cognityl will reach out to confirm your demo time.'));log.append(box);log.scrollTop=log.scrollHeight;renderChips(TXT.chips)}
function renderChips(items){chips.textContent='';(items||[]).forEach(x=>{const b=e('button','cog-chip',x);b.type='button';b.onclick=()=>handle(x);chips.appendChild(b)})}
const TTS_PROXY_URL = "https://cognityl-tts.krismezulis.workers.dev";
const TTS_VOICE = "en-US-AvaMultilingualNeural";
function escapeSsml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}
function buildSsml(text){
  return `<speak version="1.0" xml:lang="en-US"><voice name="${TTS_VOICE}"><prosody rate="0%" pitch="0%">${escapeSsml(text)}</prosody></voice></speak>`;
}
let currentAudio = null;
async function speakNaturally(text){
  if(!voiceOn) return;
  const clean = String(text).replace(/https?:\/\/\S+/g,'').replace(/\s+/g,' ').trim();
  if(!clean) return;

  if(currentAudio){ currentAudio.pause(); currentAudio = null; }

  try{
    const r = await fetch(TTS_PROXY_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ssml: buildSsml(clean) })
    });
    if(!r.ok) throw new Error('TTS request failed: ' + r.status);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => URL.revokeObjectURL(url);
    currentAudio.play();
  }catch(err){
    console.error('speakNaturally failed:', err);
  }
}
function say(text,buttons){msg('bot',text);renderChips(buttons===undefined?TXT.chips:buttons);speakNaturally(text)}
function classify(text){const h=norm(text);if(['book','demo','contact me','talk to sales'].some(x=>h.includes(norm(x))))return{type:'booking'};let best=null;KB.forEach(k=>{let score=0;(k.kw||[]).forEach(x=>{if(h.includes(norm(x)))score+=x.length});if(score&&(!best||score>best.score))best={k,score}});return best?{type:'answer',text:best.k.a}:{type:'fallback'}}
function validEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)}
async function localAIAnswer(text){try{const LM=window.LanguageModel||window.ai?.languageModel;if(!LM)return null;const availability=await LM.availability?.();if(availability==='unavailable')return null;const session=await LM.create({systemPrompt:'You are Cognityl AI. Answer briefly in English using only these verified facts: setup is a one-time fee scoped to location count and integrations, ongoing is a per-location monthly fee with no per-minute charges, it integrates with Google Calendar and Fresha, and it is built for multi-location service businesses. Never invent facts or confirm bookings.'});const out=await session.prompt(text);session.destroy?.();return String(out||'').slice(0,600)||null}catch{return null}}
function startLead(){lead={step:'name',data:{}};say(TXT.leadStart,[])}
async function leadInput(text){
if(lead.step==='name'){lead.data.name=text;lead.step='email';say(TXT.askEmail,[]);return}
if(lead.step==='email'){if(!validEmail(text)){say('Please enter a valid email address.',[]);return}lead.data.email=text;lead.step='company';say(TXT.askCompany,[]);return}
if(lead.step==='company'){lead.data.company=text;lead.step='locations';say(TXT.askLocations,[]);return}
if(lead.step==='locations'){lead.data.locations=text;lead.step='challenge';say(TXT.askChallenge,[]);return}
if(lead.step==='challenge'){lead.data.challenge=text;lead.step='time';say(TXT.askTime,[]);return}
if(lead.step==='time'){lead.data.preferredTime=text;lead.step='confirm';confirmationCard(lead.data);return}
if(lead.step==='confirm'){
if(norm(text)===norm(TXT.cancel)){lead=null;say('Request cancelled.');return}
if(norm(text)!==norm(TXT.yes)){say('Please choose "Confirm" or "Cancel".',[TXT.yes,TXT.cancel]);return}
const payload={...lead.data,submittedAt:new Date().toISOString(),pageUrl:location.href};
renderChips([]);send.disabled=true;mic.disabled=true;
try{
const body={
name:payload.name,
email:payload.email,
_replyto:payload.email,
company:payload.company,
locations:payload.locations,
challenge:payload.challenge,
preferred_time:payload.preferredTime,
page_url:payload.pageUrl,
submitted_at:payload.submittedAt,
message:`Demo request\n\nName: ${payload.name}\nEmail: ${payload.email}\nCompany: ${payload.company}\nLocations: ${payload.locations}\nChallenge: ${payload.challenge}\nPreferred time: ${payload.preferredTime}`,
_subject:'Cognityl — new demo request'
};
const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),12000);
const r=await fetch(CFG.formspree,{method:'POST',headers:{'Accept':'application/json','Content-Type':'application/json'},body:JSON.stringify(body),signal:controller.signal});clearTimeout(timer);
let result={};try{result=await r.json()}catch{}
if(!r.ok){const details=(result.errors||[]).map(x=>x.message||x.code).filter(Boolean).join(' ');throw new Error(details||('Formspree HTTP '+r.status))}
successCard();lead=null;
}catch(err){console.error('Formspree submission failed:',err);say('The request could not be sent. '+(err.name==='AbortError'?'The connection timed out.':'Please try again or email kristaps@cognityl.com.'),[TXT.yes,TXT.cancel]);lead.step='confirm';
}finally{send.disabled=false;mic.disabled=false}
}
}
async function handle(raw){const text=String(raw||'').trim().slice(0,500);if(!text)return;speechSynthesis?.cancel?.();msg('user',text);input.value='';if(lead){await leadInput(text);return}const i=classify(text);if(i.type==='booking'){startLead();return}if(i.type==='answer'){say(i.text);return}const thinking=msg('bot','');thinking.appendChild(e('span','cog-thinking'));thinking.firstChild.append(e('i'),e('i'),e('i'));const ai=await localAIAnswer(text);thinking.remove();say(ai||TXT.fallback)}
function apply(){mic.textContent=listening?TXT.stop:TXT.mic}
function resetGreeting(){log.textContent='';lead=null;say(TXT.hello)}
fab.onclick=()=>{panel.hidden=!panel.hidden;if(!panel.hidden&&!log.children.length)resetGreeting()};cb.onclick=()=>panel.hidden=true;form.onsubmit=ev=>{ev.preventDefault();handle(input.value)};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function stopListening(){if(listenTimer){clearTimeout(listenTimer);listenTimer=null}try{recognition?.stop()}catch{} }
if(!SR){mic.hidden=true;note.hidden=false;note.textContent='This browser does not support voice input. Use Chrome, Edge or Safari.'}
else{mic.onclick=async()=>{
  if(listening){stopListening();return}
  voiceOn=true;
  try{
    if(!window.isSecureContext){throw new Error('insecure')}
    if(navigator.mediaDevices?.getUserMedia){
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      stream.getTracks().forEach(t=>t.stop());
    }
    recognition=new SR();
    recognition.lang='en-US';
    recognition.interimResults=true;
    recognition.continuous=false;
    recognition.maxAlternatives=1;
    recognition.onstart=()=>{listening=true;mic.classList.add('live');apply();note.hidden=false;note.textContent=TXT.listening;listenTimer=setTimeout(()=>stopListening(),15000)};
    recognition.onresult=ev=>{let finalText='',interim='';for(let i=ev.resultIndex;i<ev.results.length;i++){const t=ev.results[i][0].transcript;if(ev.results[i].isFinal)finalText+=t;else interim+=t}note.hidden=false;note.textContent=finalText||interim||TXT.listening;if(finalText.trim().length>1){stopListening();handle(finalText)}};
    recognition.onnomatch=()=>{note.hidden=false;note.textContent='I couldn\'t hear that clearly. Press the microphone and try again, speaking a bit closer to it.'};
    recognition.onerror=ev=>{
      if(ev.error==='no-speech'){note.hidden=false;note.textContent='No speech detected — try again.';return}
      const map={
        'not-allowed':TXT.denied,
        'service-not-allowed':TXT.denied,
        'audio-capture':'Microphone unavailable. Check your browser and system microphone settings.',
        'network':'Voice recognition could not connect. Check your internet connection and try again.'
      };note.hidden=false;note.textContent=map[ev.error]||'Voice input error: '+ev.error};
    recognition.onend=()=>{if(listenTimer){clearTimeout(listenTimer);listenTimer=null}listening=false;mic.classList.remove('live');apply();if(note.textContent===TXT.listening)note.hidden=true};
    recognition.start();
  }catch(err){listening=false;mic.classList.remove('live');apply();note.hidden=false;note.textContent=err.message==='insecure'?'Voice only works on an HTTPS site.':TXT.denied}
}};
apply();
})();
</script>

<script>
(function(){
'use strict';
const CD_TTS_URL = "https://cognityl-tts.krismezulis.workers.dev";
const CD_VOICE = "en-US-AvaMultilingualNeural";
function cdEscape(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');}
function cdBuildSsml(text){return `<speak version="1.0" xml:lang="en-US"><voice name="${CD_VOICE}"><prosody rate="0%" pitch="0%">${cdEscape(text)}</prosody></voice></speak>`;}

const CD_TXT = {
  connecting:'Connecting call…', aiSpeaking:'AI is speaking…', listening:'Listening…', ended:'Call ended',
  greeting:"Thanks for calling Sunrise Auto Group — you're speaking with our AI assistant. Which location works best for you: Columbus, Dayton, or Cincinnati?",
  askService:'Got it. What can we help you with today — an oil change, tire service, a brake check, a battery check, a check-engine light, or a general inspection?',
  askVehicle:"Thanks — one more thing, what's the make, model and rough year of your vehicle?",
  offerSlot:'Based on that, we have an opening tomorrow at 10:00 AM. Would that work for you?',
  offerSlot2:'I understand. Would 2:30 PM today work better?',
  confirmed:"Great, you're all set! See you soon.",
  declineAll:'No problem — feel free to call back anytime. Thanks for calling!',
  goodbye:'Thanks for calling, goodbye!',
  areYouHuman:"I'm an AI assistant, not a live person — but I can get you booked in or connect you with the team if you'd rather speak with someone.",
  fallback:"Sorry, I didn't quite catch that. Would you like to book an appointment, or is there something else I can help with?",
  noMic:'Microphone is not available in this browser. Please use Chrome or Edge.',
  start:'Start call'
};

const CD_KB = [
  {kw:['price','cost','how much'], a:'An oil change starts at $45, tire rotation starts at $25, and a general inspection is $60.'},
  {kw:['hours','open','when'], a:'We\'re open every day from 8 AM to 7 PM.'},
  {kw:['address','located','where'], a:'Our Columbus location is at 4400 Main Street.'}
];

// Things people ask that aren't bookings or FAQs, but shouldn't dead-end either —
// a real receptionist redirects these instead of getting stuck.
const CD_REDIRECTS = [
  {kw:['how do i fix','how to fix','fix it myself','diy','repair it myself','what\'s wrong with my car','whats wrong with my car'],
   a:"I'm not able to diagnose or give repair advice over the phone, but I can get a technician to take a proper look. Would you like to book a diagnostic?"}
];

const CD_SERVICES = [
  {id:'oil', label:'an oil change', kw:['oil change','oil'], detail:'Do you know if your vehicle takes conventional or synthetic oil? If you\'re not sure, that\'s fine — we\'ll check when you arrive.'},
  {id:'tire', label:'tire service', kw:['tire rotation','tire','tires'], detail:'Are you looking for a rotation, a full set replacement, or just a pressure check?'},
  {id:'brake', label:'a brake check', kw:['brake'], detail:'Understood. Are you noticing any squeaking, grinding, or a soft pedal when you brake?'},
  {id:'battery', label:'a battery check', kw:['battery'], detail:'Got it. Is the vehicle starting fine right now, or having trouble?'},
  {id:'diagnostic', label:'a check-engine diagnostic', kw:['check engine','diagnostic','engine light'], detail:'Is the check-engine light on continuously, or does it come and go?'},
  {id:'inspection', label:'a general inspection', kw:['inspection','general inspection','multi-point','multi point'], detail:'Is this routine maintenance, or is there something specific you\'d like us to look at?'}
];

const CD_BOOK = ['book','appointment','oil change','tire','inspection','schedule','brake','battery','diagnostic','check engine'];
const CD_YES = ['yes','sure','okay','ok','fine','yeah','yep'];
const CD_LOCATIONS = ['columbus','dayton','cincinnati'];
const CD_HUMAN_CHECK = ['are you a person','are you human','am i talking to a person','is this a real person','robot'];

function cdNorm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

let cdState='idle', cdRecognition=null, cdAudio=null, cdTimerInt=null, cdSeconds=0, cdBookingStep=null, cdLocation=null, cdService=null, cdVehicle=null, cdRetries=0, cdFallbackCount=0;

const overlay=document.getElementById('cognityl-demo-overlay');
const transcriptEl=document.getElementById('cd-transcript');
const statusEl=document.getElementById('cd-status');
const controlsEl=document.getElementById('cd-controls');
const closeBtn=document.getElementById('cd-close');
const timerEl=document.getElementById('cd-timer');

function cdBubble(who,text){
  const div=document.createElement('div');
  div.className='cd-bubble '+(who==='ai'?'ai':'user');
  div.textContent=text;
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop=transcriptEl.scrollHeight;
}
function cdSetStatus(t){ statusEl.textContent=t; }
function cdStartTimer(){
  cdSeconds=0;
  cdTimerInt=setInterval(()=>{cdSeconds++;const m=Math.floor(cdSeconds/60);const s=cdSeconds%60;timerEl.textContent=`${m}:${String(s).padStart(2,'0')}`;},1000);
}
function cdStopTimer(){ if(cdTimerInt) clearInterval(cdTimerInt); }

async function cdSpeak(text){
  cdBubble('ai',text);
  cdSetStatus(CD_TXT.aiSpeaking);
  try{
    const r=await fetch(CD_TTS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssml:cdBuildSsml(text)})});
    if(!r.ok) throw new Error('TTS failed '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    cdAudio=new Audio(url);
    await new Promise((resolve)=>{
      cdAudio.onended=()=>{URL.revokeObjectURL(url);resolve();};
      cdAudio.onerror=()=>resolve();
      cdAudio.play().catch(()=>resolve());
    });
  }catch(err){ console.error('cdSpeak failed',err); }
  if(cdState==='active') cdListen();
}

function cdListen(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ cdSetStatus(CD_TXT.noMic); return; }
  cdSetStatus(CD_TXT.listening);
  cdRecognition=new SR();
  cdRecognition.lang='en-US';
  cdRecognition.interimResults=true;
  cdRecognition.continuous=true;
  cdRecognition.maxAlternatives=1;

  let finalText='';
  let silenceTimer=null;
  // Slightly more tolerant silence window and audio pre-processing
  // give the recognizer a cleaner signal and fewer false cutoffs.
  const SILENCE_MS=1700;
  const MAX_LISTEN_MS=18000;

  function scheduleFinish(){
    if(silenceTimer) clearTimeout(silenceTimer);
    silenceTimer=setTimeout(()=>{ try{ cdRecognition.stop(); }catch(e){} }, SILENCE_MS);
  }

  cdRecognition.onresult=(ev)=>{
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal) finalText+=ev.results[i][0].transcript+' ';
    }
    scheduleFinish();
  };
  cdRecognition.onerror=(ev)=>{
    if(silenceTimer) clearTimeout(silenceTimer);
    // Auto-recover from no-speech / aborted instead of leaving the call dead.
    if(cdState==='active' && cdRetries<4){ cdRetries++; setTimeout(cdListen,500); }
  };
  cdRecognition.onend=()=>{
    if(silenceTimer) clearTimeout(silenceTimer);
    const text=finalText.trim();
    if(text.length>1){ cdRetries=0; cdBubble('user',text); cdHandleTurn(text); }
    else if(cdState==='active' && cdRetries<4){ cdRetries++; setTimeout(cdListen,400); }
  };
  try{ cdRecognition.start(); }catch(e){ if(cdState==='active') setTimeout(cdListen,600); }
  setTimeout(()=>{ try{ cdRecognition.stop(); }catch(e){} }, MAX_LISTEN_MS);
}

function cdHandleTurn(rawText){
  const t=cdNorm(rawText);

  // Honest, always-on disclosure: if asked directly, say so — every turn, regardless of state.
  if(CD_HUMAN_CHECK.some(w=>t.includes(w))){ cdSpeak(CD_TXT.areYouHuman); return; }

  if(cdBookingStep==='awaitEscalation'){
    cdBookingStep=null; cdFallbackCount=0;
    if(CD_YES.some(w=>t.includes(w))){ cdSpeak("Great — I've noted that down and someone from the team will call you back shortly. Is there anything else I can help with in the meantime?"); }
    else { cdSpeak("No problem. Is there anything else I can help with?"); }
    return;
  }

  if(cdBookingStep===null && !cdLocation){
    const loc = CD_LOCATIONS.find(l=>t.includes(l));
    if(loc){ cdLocation=loc; cdFallbackCount=0; cdSpeak(`Got it — ${loc.charAt(0).toUpperCase()+loc.slice(1)}. What can we help you with today?`); return; }
  }

  if(cdBookingStep==='awaitService'){
    const svc = CD_SERVICES.find(s => (s.kw||[]).some(w=>t.includes(w)));
    if(svc){ cdService=svc; cdBookingStep='awaitServiceDetail'; cdFallbackCount=0; cdSpeak(svc.detail); return; }
    cdSpeak("Just to confirm, was that an oil change, tire service, a brake check, a battery check, a check-engine light, or a general inspection?");
    return;
  }
  if(cdBookingStep==='awaitServiceDetail'){
    cdBookingStep='awaitVehicle';
    cdFallbackCount=0;
    cdSpeak(CD_TXT.askVehicle);
    return;
  }
  if(cdBookingStep==='awaitVehicle'){
    cdVehicle = rawText.trim();
    cdBookingStep='awaitSlot1';
    cdFallbackCount=0;
    cdSpeak(CD_TXT.offerSlot);
    return;
  }
  if(cdBookingStep==='awaitSlot1'){
    if(CD_YES.some(w=>t.includes(w))){ cdBookingStep=null; cdSpeak(CD_TXT.confirmed); cdShowBookedCard(); }
    else { cdBookingStep='awaitSlot2'; cdSpeak(CD_TXT.offerSlot2); }
    cdFallbackCount=0;
    return;
  }
  if(cdBookingStep==='awaitSlot2'){
    if(CD_YES.some(w=>t.includes(w))){ cdBookingStep=null; cdSpeak(CD_TXT.confirmed); cdShowBookedCard(); }
    else { cdBookingStep=null; cdSpeak(CD_TXT.declineAll); }
    cdFallbackCount=0;
    return;
  }

  const byeWords = ['bye','goodbye','that\'s all','thats all','nothing else'];
  if(byeWords.some(w=>t.includes(w))){ cdSpeak(CD_TXT.goodbye); setTimeout(cdEndCall, 2500); return; }

  if(CD_BOOK.some(w=>t.includes(w))){ cdBookingStep='awaitService'; cdFallbackCount=0; cdSpeak(CD_TXT.askService); return; }

  const kbHit = CD_KB.find(k => (k.kw||[]).some(w=>t.includes(w)));
  if(kbHit){ cdFallbackCount=0; cdSpeak(kbHit.a); return; }

  const redirectHit = CD_REDIRECTS.find(k => (k.kw||[]).some(w=>t.includes(w)));
  if(redirectHit){ cdFallbackCount=0; cdSpeak(redirectHit.a); return; }

  // Nothing matched. Once is a shrug; twice in a row means stop looping and offer a human.
  cdFallbackCount++;
  if(cdFallbackCount>=2){
    cdFallbackCount=0;
    cdBookingStep='awaitEscalation';
    cdSpeak("I want to make sure you get a real answer on that — would you like me to have someone from the team call you back?");
    return;
  }
  cdSpeak(CD_TXT.fallback);
}

function cdShowBookedCard(){
  const div=document.createElement('div');
  div.className='cd-bubble ai';
  div.style.border='2px solid #13944A';
  div.style.background='#F3F8F4';
  const locLabel = cdLocation ? cdLocation.charAt(0).toUpperCase()+cdLocation.slice(1) : '';
  const rows = [
    ['Location', locLabel || '—'],
    ['Service', cdService ? cdService.label : '—'],
    ['Vehicle', cdVehicle || '—'],
  ];
  div.innerHTML = '<strong>✓ Appointment booked</strong><div style="margin-top:8px;font-size:12.5px;line-height:1.6;color:#356052">'
    + rows.map(([k,v])=>`<div><strong>${k}:</strong> ${v}</div>`).join('')
    + '</div>';
  transcriptEl.appendChild(div);
  transcriptEl.scrollTop=transcriptEl.scrollHeight;
}

async function cdStartCall(){
  try{
    if(navigator.mediaDevices?.getUserMedia){
      const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
      stream.getTracks().forEach(tr=>tr.stop());
    }
  }catch(e){ cdSetStatus(CD_TXT.noMic); return; }
  cdState='active';
  transcriptEl.textContent='';
  cdBookingStep=null;
  cdLocation=null;
  cdService=null;
  cdVehicle=null;
  cdRetries=0;
  cdFallbackCount=0;
  controlsEl.innerHTML='';
  const endBtn=document.createElement('button');
  endBtn.className='cd-btn-end';
  endBtn.innerHTML='&#9742;';
  endBtn.setAttribute('aria-label','End call');
  endBtn.onclick=cdEndCall;
  controlsEl.appendChild(endBtn);
  cdStartTimer();
  cdSpeak(CD_TXT.greeting);
}

function cdEndCall(){
  cdState='ended';
  cdStopTimer();
  try{ cdRecognition?.stop(); }catch(e){}
  try{ cdAudio?.pause(); }catch(e){}
  cdSetStatus(CD_TXT.ended);
  controlsEl.innerHTML='';
  const startAgain=document.createElement('button');
  startAgain.className='cd-btn-start';
  startAgain.textContent=CD_TXT.start;
  startAgain.onclick=cdStartCall;
  controlsEl.appendChild(startAgain);
}

function cdOpen(){
  overlay.hidden=false;
  cdState='idle';
  transcriptEl.textContent='';
  cdSetStatus(CD_TXT.connecting);
  timerEl.textContent='0:00';
  controlsEl.innerHTML='';
  const startAgain=document.createElement('button');
  startAgain.className='cd-btn-start';
  startAgain.textContent=CD_TXT.start;
  startAgain.onclick=cdStartCall;
  controlsEl.appendChild(startAgain);
}
function cdClose(){
  overlay.hidden=true;
  cdState='ended';
  cdStopTimer();
  try{ cdRecognition?.stop(); }catch(e){}
  try{ cdAudio?.pause(); }catch(e){}
}

closeBtn.onclick=cdClose;

window.cognitylOpenCallDemo = cdOpen;
})();
</script>
