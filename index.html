<title>Cognityl — AI Opportunity Discovery Engine</title>

<link rel="shortcut icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="description" content="Cognityl scans public business signals, detects high-value AI opportunities, and turns them into prioritized automation roadmaps." />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#101412;
    --muted:#66736d;
    --soft:#f6f8f5;
    --soft-2:#eef5ee;
    --line:#c9d0c4;
    --green:#13944a;
    --green-dark:#0e6f37;
    --green-light:#dff5e6;
    --blue:#1d6fff;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;}
  .font-display{font-family:'IBM Plex Sans',sans-serif;letter-spacing:-0.03em;}
  .font-mono{font-family:'IBM Plex Mono',monospace;}
  .glass{background:rgba(255,255,255,.84);-webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);}
  .grid-bg{background-image:linear-gradient(to right, rgba(16,20,18,.06) 1px, transparent 1px),linear-gradient(to bottom, rgba(16,20,18,.06) 1px, transparent 1px);background-size:44px 44px;}
  .gradient-text{background:linear-gradient(135deg, var(--green), var(--blue), var(--green));-webkit-background-clip:text;background-clip:text;color:transparent;background-size:200% 200%;animation:gradient-shift 4s ease-in-out infinite;}
  @keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .shadow-soft{box-shadow:4px 4px 0 rgba(16,20,18,.9);}
  .card{border:1.5px solid var(--line);background:#fff;border-radius:0px;transition:.15s ease;}
  .card:hover{border-color:var(--ink);box-shadow:3px 3px 0 rgba(16,20,18,.9);}
  .focus-ring:focus-visible{outline:3px solid var(--green-light);outline-offset:3px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .7s ease both;}

  /* Nav link fixes */
  .nav-link {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s ease;
    font-size: 0.875rem;
    padding: 0.25rem 0;
    border-bottom: 2px solid transparent;
  }
  .nav-link:hover {
    color: var(--ink);
  }
  .nav-link.active {
    color: var(--ink);
    border-bottom-color: var(--green);
  }

  /* Terminal / Code display */
  .terminal-window {
    background: #0d1110;
    border-radius: 0px;
    border: 1.5px solid var(--line);
    overflow: hidden;
    font-family: 'IBM Plex Mono', monospace;
  }
  .terminal-header {
    padding: 10px 16px;
    background: #161a18;
    border-bottom: 1px solid #1f2421;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .terminal-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .terminal-dot.red { background: #ff5f57; }
  .terminal-dot.yellow { background: #febc2e; }
  .terminal-dot.green { background: #28c840; }
  .terminal-title {
    font-size: 10px;
    color: #66736d;
    margin-left: 8px;
    letter-spacing: 0.05em;
  }
  .terminal-body {
    padding: 16px 20px;
    min-height: 260px;
    background: #0d1110;
    position: relative;
  }
  .terminal-line {
    color: #b8c4b8;
    font-size: 12px;
    line-height: 1.8;
    letter-spacing: 0.02em;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .terminal-line .prompt {
    color: #13944a;
    font-weight: 500;
  }
  .terminal-line .highlight {
    color: #7ee2a8;
  }
  .terminal-line .dim {
    color: #66736d;
  }
  .terminal-line .error {
    color: #ff6b6b;
  }
  .terminal-line .arrow {
    color: #febc2e;
  }
  .typing-cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #13944a;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .terminal-line .live-tag {
    background: #13944a22;
    color: #13944a;
    border: 1px solid #13944a44;
    padding: 0 8px;
    font-size: 8px;
    letter-spacing: 0.08em;
    margin-right: 6px;
  }
  .terminal-status {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #1f2421;
    display: flex;
    gap: 20px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .terminal-status .status-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .terminal-status .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .terminal-status .status-dot.green { background: #28c840; }
  .terminal-status .status-dot.yellow { background: #febc2e; }
  .terminal-status .status-dot.blue { background: #13944a; }
  .terminal-status .status-label {
    color: #b8c4b8;
  }
  .terminal-status .status-value {
    color: #66736d;
  }

  /* Marquee styles */
  .marquee{position:relative;overflow:hidden;width:100%;}
  .marquee-track{display:flex;animation:marquee-scroll 40s linear infinite;width:max-content;will-change:transform;}
  .marquee-showcase .marquee-track{animation-duration:90s;}
  /* Pause the scroll when the visitor hovers or tabs into it, so they can study a mockup */
  .marquee:hover .marquee-track,
  .marquee:focus-within .marquee-track{animation-play-state:paused;}
  .fade-x{-webkit-mask-image:linear-gradient(to right,transparent,black 12%,black 88%,transparent);mask-image:linear-gradient(to right,transparent,black 12%,black 88%,transparent);}
  @keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .tilt{transform:rotate(var(--r));}

  /* Respect users who ask for less motion: stop the auto-scroll and let them swipe/scroll the strip by hand */
  @media (prefers-reduced-motion: reduce){
    .marquee-track{animation:none;transform:none;}
    .marquee{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .marquee-showcase .marquee-track > :nth-child(n+6){display:none;}
    .tilt{transform:none;}
  }

  /* Our Work Showcase */
  .work-grid-item {
    position: relative;
    overflow: hidden;
    border: 1.5px solid var(--line);
    background: white;
    transition: all 0.3s ease;
  }
  .work-grid-item:hover {
    border-color: var(--ink);
    box-shadow: 4px 4px 0 rgba(16,20,18,0.9);
    transform: translateY(-4px);
  }
  .work-grid-item .work-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .work-grid-item .work-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--green);
    background: var(--green-light);
    padding: 2px 10px;
    border: 1px solid rgba(19,148,74,0.2);
  }

  /* Footer Back to Top */
  .back-to-top {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: color 0.2s ease;
    cursor: pointer;
  }
  .back-to-top:hover {
    color: var(--ink);
  }
  .back-to-top .arrow-up {
    display: inline-block;
    animation: bob 1.8s ease-in-out infinite;
    font-size: 18px;
    line-height: 1;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Chatbot styles */
  .chatbot-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 1000;
    width: 380px;
    max-width: calc(100vw - 48px);
    max-height: 600px;
    display: flex;
    flex-direction: column;
    background: white;
    border: 1.5px solid var(--line);
    box-shadow: 0 20px 60px rgba(16,20,18,0.2);
    transition: all 0.3s ease;
    border-radius: 8px;
    overflow: hidden;
  }
  .chatbot-container.closed {
    width: auto;
    max-height: none;
    background: transparent;
    border: none;
    box-shadow: none;
  }
  .chatbot-toggle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(19,148,74,0.3);
    transition: all 0.2s ease;
  }
  .chatbot-toggle:hover {
    transform: scale(1.05);
    background: var(--green-dark);
  }
  .chatbot-header {
    padding: 16px 20px;
    background: var(--ink);
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .chatbot-header button {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 20px;
    opacity: 0.7;
    transition: opacity 0.2s ease;
  }
  .chatbot-header button:hover {
    opacity: 1;
  }
  .chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 200px;
    max-height: 350px;
    background: #fafafa;
  }
  .chatbot-message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .chatbot-message.bot {
    background: white;
    border: 1px solid var(--line);
    align-self: flex-start;
  }
  .chatbot-message.user {
    background: var(--green);
    color: white;
    align-self: flex-end;
  }
  .chatbot-input {
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: white;
  }
  .chatbot-input input {
    flex: 1;
    border: 1px solid var(--line);
    padding: 8px 12px;
    outline: none;
    font-size: 14px;
    border-radius: 4px;
  }
  .chatbot-input input:focus {
    border-color: var(--green);
  }
  .chatbot-input button {
    background: var(--green);
    color: white;
    border: none;
    padding: 8px 20px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s ease;
    border-radius: 4px;
  }
  .chatbot-input button:hover {
    background: var(--green-dark);
  }
  .chatbot-input button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .typing-indicator {
    padding: 10px 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 6px;
    align-self: flex-start;
    display: flex;
    gap: 4px;
  }
  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: typing 1.4s infinite both;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
  .chatbot-suggestion {
    padding: 6px 12px;
    background: var(--soft);
    border: 1px solid var(--line);
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    color: var(--muted);
    transition: all 0.15s ease;
  }
  .chatbot-suggestion:hover {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--ink);
  }

  /* Agent workflow demo */
  .agent-demo-step {
    position: relative;
    padding: 1.5rem;
    border: 1.5px solid var(--line);
    background: white;
    transition: all 0.3s ease;
  }
  .agent-demo-step:hover {
    border-color: var(--green);
    box-shadow: 3px 3px 0 rgba(16,20,18,0.9);
  }
  .agent-demo-step .step-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--green-light);
    line-height: 1;
  }
  .agent-demo-arrow {
    font-size: 24px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 768px) {
    .agent-demo-arrow {
      transform: rotate(90deg);
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef} = React;

const Icon = ({name, className="w-5 h-5"}) => {
  const icons = {
    spark:"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8L12 2zM19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8L19 16z",
    bot:"M12 8V4m-5 8h10M7 12a5 5 0 0 0 10 0v-1a5 5 0 0 0-10 0v1zm-3 1v2m16-2v2M9 15h.01M15 15h.01",
    flow:"M4 7h6v6H4V7zm10-3h6v6h-6V4zm0 10h6v6h-6v-6zM10 10h4M10 13l4 4",
    chart:"M4 19V5m0 14h16M8 15l3-3 3 2 5-7",
    shield:"M12 3l8 4v5c0 5-3.4 8.7-8 9-4.6-.3-8-4-8-9V7l8-4z",
    arrow:"M5 12h14m-6-6l6 6-6 6",
    check:"M20 6L9 17l-5-5",
    mail:"M4 6h16v12H4V6zm0 0l8 7 8-7",
    users:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm13 10v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
    plug:"M12 22v-5M9 8V2m6 6V2M7 8h10v4a5 5 0 0 1-10 0V8z",
    clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm0-14v5l3 2",
    lock:"M6 11V7a6 6 0 1 1 12 0v4M5 11h14v10H5V11z",
    pause:"M9 5v14M15 5v14",
    doc:"M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6zM14 3v6h6",
    building:"M4 21V6l8-4 8 4v15M9 9h.01M9 13h.01M15 9h.01M15 13h.01M9 21v-5h6v5",
    scan:"M4 7V4h3M17 4h3v3M20 17v3h-3M7 20H4v-3M9 9h6v6H9z",
    activity:"M22 12h-4l-3 9L9 3l-3 9H2",
    layers:"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5",
    x:"M18 6L6 18M6 6l12 12",
  };
  return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={icons[name]} /></svg>;
};

// ==================== NAVIGATION ====================
function NavDropdown({label, items}){
  return (
    <div className="relative group h-[72px] flex items-center">
      <button
        className="px-3 h-[72px] inline-flex items-center gap-1.5 text-sm text-[var(--muted)] group-hover:text-[var(--ink)] group-focus-within:text-[var(--ink)] transition focus-ring"
        aria-haspopup="true"
      >
        {label}
        <svg className="w-3.5 h-3.5 transition-transform duration-200 group-hover:rotate-180 group-focus-within:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      {/* pt-2 forms an invisible bridge so the panel doesn't close between button and menu */}
      <div className="absolute left-0 top-full min-w-[264px] pt-2 z-50 opacity-0 invisible -translate-y-1 group-hover:opacity-100 group-hover:visible group-hover:translate-y-0 group-focus-within:opacity-100 group-focus-within:visible group-focus-within:translate-y-0 transition-all duration-200">
        <div className="bg-white border border-[var(--line)] shadow-[4px_4px_0_rgba(16,20,18,0.9)]">
          {items.map(([lbl,id,desc])=>(
            <a key={id} href={`#${id}`} className="block px-4 py-3 border-b border-[var(--line)] last:border-b-0 hover:bg-[var(--soft)] transition focus-ring">
              <span className="block text-sm font-semibold text-[var(--ink)]">{lbl}</span>
              <span className="block text-xs text-[var(--muted)] mt-0.5 leading-snug">{desc}</span>
            </a>
          ))}
        </div>
      </div>
    </div>
  );
}

function Nav(){
  const [open,setOpen]=useState(false);

  const platform=[
    ['Engine','engine','How the Discovery Engine works'],
    ['Report','report','The AI Opportunity Report'],
    ['Process','process','Scan to deployment, step by step'],
    ['Use cases','use-cases','Where teams put it to work'],
    ['Showcase','showcase','Tools we design and ship'],
  ];
  const trust=[
    ['Security','security','Data handling & access control'],
    ['Governance','governance','Accountability & human oversight'],
    ['Data policy','data-policy','What we scan, and how to opt out'],
  ];
  const direct=[['Our Work','work'],['FAQ','faq']];

  const closeMobile=()=>setOpen(false);

  return <header className="fixed top-0 inset-x-0 z-50 border-b border-[var(--line)] glass">
    <div className="max-w-7xl mx-auto px-5 lg:px-8 h-[72px] flex items-center justify-between gap-4">
      {/* Logo */}
      <a href="#top" className="flex items-center gap-2.5 mr-2 focus-ring">
        <div className="w-9 h-9 rounded-none bg-[#1F8B41] text-white flex items-center justify-center font-display text-lg font-bold">C</div>
        <span className="font-display text-xl font-bold tracking-tight text-[var(--ink)]">Cognityl</span>
      </a>

      {/* Desktop nav */}
      <nav className="hidden lg:flex items-center gap-1">
        <NavDropdown label="Platform" items={platform}/>
        <NavDropdown label="Trust & security" items={trust}/>
        {direct.map(([label,id])=>(
          <a key={id} href={`#${id}`} className="px-3 h-[72px] flex items-center text-sm text-[var(--muted)] hover:text-[var(--ink)] transition focus-ring">{label}</a>
        ))}
      </nav>

      {/* Desktop CTA */}
      <div className="hidden lg:flex items-center flex-shrink-0">
        <a href="#contact" className="inline-flex items-center gap-2 rounded-none bg-[var(--ink)] text-white px-5 py-2.5 text-sm font-semibold hover:bg-[var(--green-dark)] transition focus-ring whitespace-nowrap">Get AI Opportunity Report <Icon name="arrow" className="w-4 h-4"/></a>
      </div>

      {/* Mobile toggle */}
      <button className="lg:hidden w-10 h-10 flex items-center justify-center focus-ring" onClick={()=>setOpen(!open)} aria-label="Toggle menu" aria-expanded={open}>
        {open ? <Icon name="x" className="w-6 h-6"/> : <span className="text-2xl leading-none">☰</span>}
      </button>
    </div>

    {/* Mobile menu */}
    {open && <div className="lg:hidden border-t border-[var(--line)] bg-white max-h-[calc(100vh-72px)] overflow-y-auto">
      <div className="px-5 py-5 space-y-6">
        <div>
          <p className="font-mono text-[10px] uppercase tracking-[0.12em] text-[var(--muted)] mb-1">Platform</p>
          <div className="flex flex-col">
            {platform.map(([label,id])=><a key={id} href={`#${id}`} onClick={closeMobile} className="py-2 text-[15px] font-medium text-[var(--ink)]">{label}</a>)}
          </div>
        </div>
        <div>
          <p className="font-mono text-[10px] uppercase tracking-[0.12em] text-[var(--muted)] mb-1">Trust &amp; security</p>
          <div className="flex flex-col">
            {trust.map(([label,id])=><a key={id} href={`#${id}`} onClick={closeMobile} className="py-2 text-[15px] font-medium text-[var(--ink)]">{label}</a>)}

// ==================== TERMINAL WITH TYPING ANIMATION ====================
function TerminalDisplay() {
  // The full sequence the "engine" types out, then loops.
  const script = [
    { cmd: 'crawl',  rest: ' reading public pages, forms, catalogues...' },
    { cmd: 'detect', rest: ' weak lead capture on /contact — no follow-up path' },
    { cmd: 'detect', rest: ' quote request friction — 3 clicks to submit' },
    { cmd: 'score',  rest: ' automation opportunities [support: 87, sales: 92, ops: 71]' },
    { cmd: '→',      rest: ' Report ready · 1-page PDF', final: true },
  ];

  const TYPE_MS = 28;        // per-character typing speed
  const LINE_PAUSE_MS = 450; // pause after a line finishes typing
  const RESTART_MS = 4200;   // hold on the finished block, then loop

  const fullText = (l) => '> ' + l.cmd + l.rest;

  const [lineIdx, setLineIdx] = useState(0);   // line currently being typed
  const [charCount, setCharCount] = useState(0); // chars shown of that line

  // Single self-scheduling timer: advance one character, one line, or restart.
  useEffect(() => {
    let t;
    if (lineIdx >= script.length) {
      t = setTimeout(() => { setLineIdx(0); setCharCount(0); }, RESTART_MS);
      return () => clearTimeout(t);
    }
    const full = fullText(script[lineIdx]);
    if (charCount < full.length) {
      t = setTimeout(() => setCharCount((c) => c + 1), TYPE_MS);
    } else {
      t = setTimeout(() => { setLineIdx((i) => i + 1); setCharCount(0); }, LINE_PAUSE_MS);
    }
    return () => clearTimeout(t);
  }, [lineIdx, charCount]);

  // Split a (possibly partial) line into styled spans: prompt / command / rest.
  const renderSpans = (text, isFinal) => {
    if (!text.startsWith('>')) return <span className="dim">{text}</span>;
    const afterPrompt = text.slice(2);
    const sp = afterPrompt.indexOf(' ');
    const cmd = sp === -1 ? afterPrompt : afterPrompt.slice(0, sp);
    const rest = sp === -1 ? '' : afterPrompt.slice(sp);
    return (
      <React.Fragment>
        <span className="prompt">{'> '}</span>
        <span className={isFinal ? 'arrow' : 'highlight'}>{cmd}</span>
        <span className="dim">{rest}</span>
      </React.Fragment>
    );
  };

  const finished = lineIdx >= script.length;
  const completedCount = finished ? script.length : lineIdx;

  return (
    <div className="card shadow-soft overflow-hidden">
      <div className="terminal-window">
        <div className="terminal-header">
          <span className="terminal-dot red"></span>
          <span className="terminal-dot yellow"></span>
          <span className="terminal-dot green"></span>
          <span className="terminal-title">COGNITYL · DISCOVERY ENGINE</span>
          <span className="ml-auto text-[8px] text-[#28c840] font-mono bg-[#28c84022] px-2 py-0.5 border border-[#28c84044]">LIVE</span>
        </div>
        <div className="terminal-body">
          {script.slice(0, completedCount).map((l, i) => (
            <div key={i} className="terminal-line">
              {renderSpans(fullText(l), l.final)}
              {finished && i === completedCount - 1 && <span className="typing-cursor"></span>}
            </div>
          ))}
          {!finished && (
            <div key="typing" className="terminal-line">
              {renderSpans(fullText(script[lineIdx]).slice(0, charCount), script[lineIdx].final)}
              <span className="typing-cursor"></span>
            </div>
          )}
          <div className="terminal-status">
            <span className="status-item">
              <span className="status-dot green"></span>
              <span className="status-label">SIGNALS</span>
              <span className="status-value">public only</span>
            </span>
            <span className="status-item">
              <span className="status-dot yellow"></span>
              <span className="status-label">LOGINS</span>
              <span className="status-value">0 required</span>
            </span>
            <span className="status-item">
              <span className="status-dot blue"></span>
              <span className="status-label">OUTPUT</span>
              <span className="status-value">1-page PDF</span>
            </span>
          </div>
        </div>
      </div>
    </div>
  );
}

function DataPolicy(){
  const [optOutSent,setOptOutSent]=useState(false);
  const [optOutError,setOptOutError]=useState(false);

  const handleOptOutSubmit = async (event) => {
    event.preventDefault();
    setOptOutError(false);

    const form = event.currentTarget;
    const formData = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: { Accept: "application/json" }
      });

      if (response.ok) {
        form.reset();
        setOptOutSent(true);
      } else {
        setOptOutError(true);
      }
    } catch (error) {
      setOptOutError(true);
    }
  };

  const items=[
    ['scan','Public sources only','The Discovery Engine reads what a person could already see by visiting your website: pages, forms, catalogues, FAQs and published content. It does not access private systems, logins or internal data.'],
    ['users','No personal or sensitive data','We look for business signals — site structure, content, funnel gaps — not personal details about individuals. Business contact information used for outreach is limited to what a company has published publicly.'],
    ['shield','GDPR / CCPA aligned by design','Our data-handling practices follow GDPR and CCPA principles: data is used only for the stated purpose, kept only as long as necessary, and never sold to third parties.'],
    ['pause','You can opt out anytime',"If you'd rather your business website not be scanned or included in outreach, submit the form below and we'll exclude your domain and remove any related records — no back and forth required."],
  ];
  return <section id="data-policy" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">
    <div className="max-w-2xl mb-14">
      <p className="text-[var(--green)] font-semibold mb-3">How we source data</p>
      <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">The Discovery Engine only looks at what's already public.</h2>
      <p className="mt-5 text-lg text-[var(--muted)] leading-relaxed">Since Cognityl's reports are built from public business signals, we think it matters to be specific about what that means in practice.</p>

// ==================== CHATBOT ====================
function ChatBot() {
  const [isOpen, setIsOpen] = useState(false);
  const [messages, setMessages] = useState([
    { type: 'bot', text: "Hi there! I'm Cognityl's AI assistant. I can help you understand how we discover AI opportunities. What would you like to know?" }
  ]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [hasCapturedLead, setHasCapturedLead] = useState(false);
  const messagesEndRef = useRef(null);
  
  const suggestions = [
    "How does the engine work?",
    "What does a report include?",
    "How much does it cost?",
    "Is my data secure?"
  ];
  
  const botResponses = {
    "how does the engine work": "Our Discovery Engine scans publicly available business signals on your website — pages, forms, catalogues, FAQs, and support content. It identifies bottlenecks and matches them to practical AI use cases, then ranks them by impact and effort.",
    "what does a report include": "The AI Opportunity Report includes: an AI readiness score, a map of visible business problems, ranked automation opportunities, and a specific first-step recommendation. It's delivered as a one-page PDF you can forward internally.",
    "how much does it cost": "We start with a free Discovery Scan. From there, pilot projects typically run 4-8 weeks and are scoped narrowly to prove value before any larger commitment. Contact us for specific pricing tailored to your needs.",
    "is my data secure": "Yes. We only use publicly available data. Your data is never used to train shared models. We follow GDPR/CCPA principles, and SOC 2 Type II / ISO 27001 certifications are in progress. Every agent has a manual override and audit trails.",
    "default": "That's a great question. While I'm a demo assistant, our team would be happy to discuss this in detail. Would you like me to connect you with someone? Just ask to 'speak to a human' or submit the contact form."
  };
  
  const getBotResponse = (userInput) => {
    const lowerInput = userInput.toLowerCase();
    for (const [key, response] of Object.entries(botResponses)) {
      if (lowerInput.includes(key)) {
        return response;
      }
    }
    if (lowerInput.includes('human') || lowerInput.includes('talk') || lowerInput.includes('speak')) {
      return "I'll connect you with our team right away! In the meantime, you can also fill out the contact form on this page and we'll get back to you within 24 hours.";
    }
    return botResponses.default;
  };
  
  const handleSend = async () => {
    if (!input.trim() || isTyping) return;
    
    const userMessage = input.trim();
    setMessages(prev => [...prev, { type: 'user', text: userMessage }]);
    setInput('');
    setIsTyping(true);
    
    setTimeout(() => {
      const response = getBotResponse(userMessage);
      setMessages(prev => [...prev, { type: 'bot', text: response }]);
      setIsTyping(false);
      
      if (messages.length >= 3 && !hasCapturedLead) {
        setTimeout(() => {
          setMessages(prev => [...prev, { 
            type: 'bot', 
            text: "By the way, if you'd like a personalized AI Opportunity Report for your business, just share your email and website and I'll get that started for you. Or fill out the contact form above!" 
          }]);
          setHasCapturedLead(true);
        }, 1000);
      }
    }, 1000 + Math.random() * 1000);
  };
  
  const handleSuggestion = (suggestion) => {
    setInput(suggestion);
    setTimeout(() => {
      handleSend();
    }, 200);
  };
  
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);
  
  return (
    <div className={`chatbot-container ${!isOpen ? 'closed' : ''}`}>
      {!isOpen ? (
        <button onClick={() => setIsOpen(true)} className="chatbot-toggle" aria-label="Open chat">
          <Icon name="bot" className="w-7 h-7" />
        </button>
      ) : (
        <>
          <div className="chatbot-header">
            <div className="flex items-center gap-2">
              <Icon name="bot" className="w-5 h-5" />
              <span className="font-semibold">Cognityl Assistant</span>
            </div>
            <button onClick={() => setIsOpen(false)} aria-label="Close chat">✕</button>
          </div>
          
          <div className="chatbot-messages">
            {messages.map((msg, idx) => (
              <div key={idx} className={`chatbot-message ${msg.type}`}>
                {msg.text}
              </div>
            ))}
            {isTyping && (
              <div className="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
              </div>
            )}
            <div ref={messagesEndRef} />
          </div>
          
          {messages.length < 4 && (
            <div className="px-4 py-2 flex gap-2 flex-wrap border-t border-[var(--line)] bg-[var(--soft)]">
              {suggestions.map(s => (
                <button key={s} onClick={() => handleSuggestion(s)} className="chatbot-suggestion">
                  {s}
                </button>
              ))}
            </div>
          )}
          
          <div className="chatbot-input">
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleSend()}
              placeholder="Ask me anything..."
              disabled={isTyping}
            />
            <button onClick={handleSend} disabled={isTyping}>
              Send
            </button>
          </div>
        </>
      )}
    </div>
  );
}
