<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cognityl — AI administrators, kas atbild uz katru zvanu</title>
<meta name="description" content="AI administrators jūsu biznesam: atbild uz zvaniem 24/7 latviski, krieviski un angliski, un automātiski rezervē vizītes jūsu kalendārā. Autoservisiem, frizētavām un skaistumkopšanas saloniem." />

<meta property="og:title" content="Cognityl — AI administrators, kas atbild uz katru zvanu" />

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:    { DEFAULT:'#0B1F17', soft:'#1B3329', muted:'#5C6F66' },
          brand:  { DEFAULT:'#059669', dark:'#047857', bright:'#10B981', light:'#D1FAE5', wash:'#F0FDF7' },
          loss:   { DEFAULT:'#DC2626', light:'#FEF2F2', line:'#FECACA' },

          display: ['Archivo','system-ui','sans-serif'],

<style>
  html{scroll-behavior:smooth;}
  body{-webkit-font-smoothing:antialiased;}
  .display{font-family:'Archivo',system-ui,sans-serif;letter-spacing:-0.035em;}

  /* Focus visibility — keyboard users must always see where they are */
  .focus-ring:focus-visible{outline:3px solid #10B981;outline-offset:3px;border-radius:2px;}

  /* Range sliders (loss calculator) */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:99px;
    background:#E2E8E4;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:26px;height:26px;
    border-radius:50%;background:#0B1F17;cursor:pointer;border:3px solid #fff;
    box-shadow:0 2px 8px rgba(11,31,23,.28);}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#0B1F17;
    cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(11,31,23,.28);}
  input[type=range]:focus-visible::-webkit-slider-thumb{outline:3px solid #10B981;outline-offset:2px;}

  /* Hero call animation */
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .rise{animation:rise .35s ease-out both;}
  @keyframes pulsering{0%{box-shadow:0 0 0 0 rgba(16,185,129,.45)}70%{box-shadow:0 0 0 18px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
  .pulse-ring{animation:pulsering 2s infinite;}
  .dots span{width:6px;height:6px;border-radius:50%;background:#94A3A0;display:inline-block;
    animation:bounce 1.3s infinite both;}
  .dots span:nth-child(2){animation-delay:.18s}
  .dots span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    .rise,.pulse-ring,.dots span{animation:none !important;}
    *{transition:none !important;}
  }

  /* Leave room for the sticky mobile call bar */
  @media (max-width: 767px){ body{padding-bottom:76px;} }
</style>
</head>
<body class="bg-white text-ink font-sans">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const {useState, useEffect, useRef, useCallback} = React;

/* ─────────────────────────────────────────────────────────
   VIENA VIETA, KUR MAINĪT KONTAKTUS
   Nomainiet šos divus laukus, kad demo numurs ir aktīvs.
   PHONE_TEL drīkst saturēt tikai ciparus un + zīmi.
   ───────────────────────────────────────────────────────── */
const PHONE_DISPLAY = "+371 XX XXX XXX";   // kā to redz apmeklētājs
const PHONE_TEL     = "";                   // piem. "+37120000000" — kamēr tukšs, poga ved uz pieteikuma formu
const EMAIL         = "kristaps@cognityl.com";

const hasPhone = PHONE_TEL.replace(/[^\d+]/g, "").length > 7;
const callHref = hasPhone ? `tel:${PHONE_TEL.replace(/[^\d+]/g,"")}` : "#pieteikties";

const eur = (n) => new Intl.NumberFormat('lv-LV',{maximumFractionDigits:0}).format(Math.round(n)) + " €";

/* ── Ikonas ───────────────────────────────────────────── */
const Icon = ({name, className="w-5 h-5"}) => {
  const p = {
    phone:"M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z",
    clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm0-14v5l3 2",
    globe:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM2 12h20M12 2a15 15 0 0 1 0 20a15 15 0 0 1 0-20z",
    calendar:"M8 2v4M16 2v4M3 8h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z",
    check:"M20 6L9 17l-5-5",
    arrow:"M5 12h14m-6-6l6 6-6 6",
    trend:"M22 7l-8.5 8.5-5-5L2 17",
    shield:"M12 3l8 4v5c0 5-3.4 8.7-8 9-4.6-.3-8-4-8-9V7l8-4z",
    missed:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM15 9l-6 6M9 9l6 6",
    menu:"M4 7h16M4 12h16M4 17h16",
    x:"M18 6L6 18M6 6l12 12",
    spark:"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8L12 2z",
  };
  return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"><path d={p[name]}/></svg>;
};

/* ── Pogas ────────────────────────────────────────────── */
const CallButton = ({className="", children, size="lg"}) => (
  <a href={callHref}
     className={`inline-flex items-center justify-center gap-2.5 rounded-full bg-brand text-white font-semibold
       hover:bg-brand-dark active:scale-[.98] transition focus-ring shadow-lg shadow-brand/25
       ${size==="lg" ? "px-7 py-4 text-[17px]" : "px-5 py-3 text-[15px]"} ${className}`}>
    <Icon name="phone" className="w-5 h-5"/>
    {children || "Zvanīt AI asistentam tūlīt"}
  </a>
);

/* ══════════════════════════════════════════════════════
   NAVIGĀCIJA
   ══════════════════════════════════════════════════════ */
function Nav(){
  const [open,setOpen] = useState(false);
  const [solid,setSolid] = useState(false);

  useEffect(()=>{
    const onScroll = () => setSolid(window.scrollY > 12);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  },[]);

  const links = [
    ["Kā tas strādā", "#ka-tas-strada"],
    ["Ieguvumi", "#ieguvumi"],
    ["Cenas", "#cenas"],
  ];

  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition ${solid ? "bg-white/90 backdrop-blur border-b border-line" : "bg-transparent"}`}>
      <div className="max-w-6xl mx-auto px-5 lg:px-8 h-[68px] flex items-center justify-between">

        <a href="#top" className="flex items-center gap-2.5 focus-ring">
          <span className="w-9 h-9 rounded-xl bg-ink text-white grid place-items-center display font-extrabold text-lg">C</span>
          <span className="display text-xl font-extrabold">Cognityl</span>
        </a>

        <nav className="hidden md:flex items-center gap-8" aria-label="Galvenā navigācija">
          {links.map(([label,href])=>(
            <a key={href} href={href}
               className="text-[15px] font-medium text-ink-muted hover:text-ink transition focus-ring">{label}</a>
          ))}
        </nav>

        <div className="hidden md:block">
          <CallButton size="sm">Izmēģināt demo</CallButton>
        </div>

        <button onClick={()=>setOpen(!open)} aria-expanded={open} aria-label="Atvērt izvēlni"
          className="md:hidden w-11 h-11 grid place-items-center focus-ring">
          <Icon name={open ? "x" : "menu"} className="w-6 h-6"/>
        </button>
      </div>

      {open && (
        <div className="md:hidden bg-white border-b border-line">
          <div className="px-5 py-4 flex flex-col">
            {links.map(([label,href])=>(
              <a key={href} href={href} onClick={()=>setOpen(false)}
                 className="py-3 text-[16px] font-medium border-b border-line last:border-0">{label}</a>
            ))}
          </div>
        </div>
      )}
    </header>
  );
}

/* ══════════════════════════════════════════════════════
   PARAKSTA ELEMENTS: dzīva saruna telefonā
   Klients zvana → AI atbild → vizīte kalendārā
   ══════════════════════════════════════════════════════ */
const SCRIPT = [
  {who:'ai',     text:'Labdien! Auto Serviss Rīga, kā varu palīdzēt?'},
  {who:'client', text:'Sveiki, gribu pieteikties uz riepu maiņu.'},
  {who:'ai',     text:'Protams. Vai jums derētu rītdien plkst. 10:00?'},
  {who:'client', text:'Jā, derēs.'},
  {who:'ai',     text:'Lieliski — esmu jūs pierakstījis. Uz tikšanos!'},
];

function LiveCall(){
  const reduce = typeof window !== "undefined" &&
    window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // reduce = uzreiz rādām visu sarunu, bez animācijas
  const [shown,setShown]   = useState(reduce ? SCRIPT.length : 0);
  const [typing,setTyping] = useState(false);
  const [booked,setBooked] = useState(reduce);
  const timers = useRef([]);

  const clearTimers = () => { timers.current.forEach(clearTimeout); timers.current = []; };

  useEffect(()=>{
    if (reduce) return;

    const run = () => {
      clearTimers();
      setShown(0); setBooked(false); setTyping(true);

      let t = 900; // "zvans savienojas"
      SCRIPT.forEach((_, i) => {
        timers.current.push(setTimeout(()=>{
          setShown(i+1);
          setTyping(i < SCRIPT.length-1);
        }, t));
        t += 1500;
      });

      timers.current.push(setTimeout(()=>{ setTyping(false); setBooked(true); }, t));
      timers.current.push(setTimeout(run, t + 4200)); // cilpa
    };

    run();
    return clearTimers;
  },[reduce]);

  return (
    <div className="relative">
      {/* Telefona korpuss */}
      <div className="relative mx-auto w-full max-w-[360px] rounded-[36px] bg-ink p-2.5 shadow-2xl shadow-ink/25">
        <div className="rounded-[28px] bg-white overflow-hidden">

          {/* Zvana josla */}
          <div className="bg-ink text-white px-5 pt-4 pb-5">
            <div className="flex items-center justify-between text-[11px] font-mono text-white/45 mb-4">
              <span>9:41</span>
              <span className="flex items-center gap-1.5">
                <span className="w-1.5 h-1.5 rounded-full bg-brand-bright"></span>
                COGNITYL AI
              </span>
            </div>
            <div className="flex items-center gap-3">
              <span className="w-11 h-11 rounded-full bg-brand grid place-items-center pulse-ring flex-shrink-0">
                <Icon name="phone" className="w-5 h-5 text-white"/>
              </span>
              <div className="leading-tight min-w-0">
                <p className="font-mono text-[13px] text-white/60">+371 2X XXX XXX</p>
                <p className="text-[13px] font-semibold text-brand-bright">
                  {booked ? "Zvans pabeigts · 0:38" : "AI atbild…"}
                </p>
              </div>
            </div>
          </div>

          {/* Sarunas atšifrējums */}
          <div className="px-4 py-4 bg-[#F7FAF8] min-h-[280px] flex flex-col gap-2.5" aria-live="polite">
            {SCRIPT.slice(0,shown).map((m,i)=>(
              <div key={i} className={`rise flex ${m.who==='ai' ? 'justify-start' : 'justify-end'}`}>
                <div className={`max-w-[82%] px-3.5 py-2.5 text-[13.5px] leading-snug rounded-2xl
                  ${m.who==='ai'
                    ? 'bg-white border border-line rounded-bl-md text-ink'
                    : 'bg-ink text-white rounded-br-md'}`}>
                  {m.text}
                </div>
              </div>
            ))}

            {typing && (
              <div className="flex justify-start">
                <div className="dots bg-white border border-line rounded-2xl rounded-bl-md px-4 py-3 flex gap-1 items-center">
                  <span></span><span></span><span></span>
                </div>
              </div>
            )}

            {/* Rezervācijas apstiprinājums */}
            {booked && (
              <div className="rise mt-auto pt-2">
                <div className="rounded-2xl border-2 border-brand bg-brand-light/70 p-3.5">
                  <p className="flex items-center gap-2 text-[11px] font-mono uppercase tracking-wider text-brand-dark font-semibold mb-2">
                    <Icon name="check" className="w-3.5 h-3.5"/> Vizīte rezervēta
                  </p>
                  <p className="font-semibold text-[15px] text-ink">Riepu maiņa</p>
                  <p className="text-[13px] text-ink-muted">Rītdien, plkst. 10:00</p>
                  <p className="flex items-center gap-1.5 text-[12px] text-brand-dark font-medium mt-2 pt-2 border-t border-brand/25">
                    <Icon name="calendar" className="w-3.5 h-3.5"/> Pievienots Google Calendar
                  </p>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Peldošā zīmīte — tikai uz lieliem ekrāniem, lai nesaspiestu mobilo */}
      <div className="hidden lg:flex absolute -left-6 top-1/3 items-center gap-2 rounded-full bg-white
        border border-line shadow-xl px-4 py-2.5">
        <span className="w-2 h-2 rounded-full bg-brand-bright"></span>
        <span className="text-[13px] font-semibold">Atbild 2 sekundēs</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   HERO
   ══════════════════════════════════════════════════════ */
function Hero(){
  return (
    <section id="top" className="relative pt-28 md:pt-36 pb-16 md:pb-24 overflow-hidden">
      {/* maigs fona akcents */}
      <div className="absolute inset-0 -z-10 bg-gradient-to-b from-brand-wash to-white"></div>

      <div className="max-w-6xl mx-auto px-5 lg:px-8 grid lg:grid-cols-[1.05fr_.95fr] gap-14 lg:gap-12 items-center">

        <div>
          <p className="inline-flex items-center gap-2 rounded-full border border-line bg-white px-3.5 py-1.5
            text-[13px] font-medium text-ink-muted mb-6 shadow-sm">
            <span className="w-1.5 h-1.5 rounded-full bg-brand-bright"></span>
            AI administrators · runā latviski, krieviski, angliski
          </p>

          <h1 className="display text-[40px] leading-[1.02] sm:text-[54px] lg:text-[62px] font-extrabold">
            Beidziet zaudēt klientus <span className="text-brand">neatbildētu zvanu</span> dēļ.
          </h1>

          <p className="mt-6 text-[17px] sm:text-[19px] leading-relaxed text-ink-muted max-w-xl">
            Jūsu jaunais AI administrators atbild uz zvaniem 24/7, runā latviski un krieviski,
            un automātiski rezervē vizītes jūsu kalendārā.
          </p>

          <div className="mt-8 flex flex-col sm:flex-row gap-3">
            <CallButton/>
            <a href="#pieteikties"
               className="inline-flex items-center justify-center gap-2 rounded-full bg-white border-2 border-ink
                 px-7 py-4 text-[17px] font-semibold hover:bg-ink hover:text-white transition focus-ring">
              Pieteikt konsultāciju
            </a>
          </div>

          <p className="mt-5 flex items-start gap-2 text-[14px] text-ink-muted">
            <Icon name="check" className="w-4 h-4 text-brand mt-0.5 flex-shrink-0"/>
            Pielāgojams autoservisiem, frizētavām un skaistumkopšanas saloniem.
          </p>
        </div>

        <LiveCall/>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════
   PROBLĒMA — kalkulators (paša īpašnieka skaitļi)
   ══════════════════════════════════════════════════════ */
function Problem(){
  const [calls,setCalls] = useState(5);   // neatbildētie zvani dienā
  const [value,setValue] = useState(30);  // vidējais pirkums €

  const perDay   = calls * value;
  const perMonth = perDay * 22;   // ~22 darba dienas
  const perYear  = perMonth * 12;

  return (
    <section className="py-20 md:py-28 bg-ink text-white">
      <div className="max-w-6xl mx-auto px-5 lg:px-8">

        <div className="max-w-2xl">
          <p className="inline-flex items-center gap-2 text-[12px] font-mono uppercase tracking-[0.14em]
            text-loss-line mb-5">
            <Icon name="missed" className="w-4 h-4"/> Neatbildētie zvani
          </p>
          <h2 className="display text-[34px] sm:text-[44px] leading-[1.06] font-extrabold">
            Cik daudz naudas jūs šodien pazaudējāt?
          </h2>
          <p className="mt-5 text-[17px] leading-relaxed text-white/65">
            Kamēr jūs strādājat, klienti zvana. Ja jūs neatbildat 15 sekunžu laikā,
            viņi zvana jūsu konkurentiem.
          </p>
        </div>

        <div className="mt-12 grid lg:grid-cols-[1fr_1fr] gap-6 items-stretch">

          {/* Slīdņi */}
          <div className="rounded-3xl bg-white/[0.06] border border-white/10 p-6 sm:p-8">
            <p className="text-[12px] font-mono uppercase tracking-[0.12em] text-white/40 mb-7">
              Ievadiet savus skaitļus
            </p>

            <div className="mb-8">
              <label htmlFor="calls" className="flex items-baseline justify-between mb-3">
                <span className="text-[15px] font-medium text-white/85">Neatbildēti zvani dienā</span>
                <span className="font-mono text-[22px] font-semibold text-white">{calls}</span>
              </label>
              <input id="calls" type="range" min="1" max="20" value={calls}
                onChange={e=>setCalls(+e.target.value)} className="focus-ring"/>
            </div>

            <div>
              <label htmlFor="value" className="flex items-baseline justify-between mb-3">
                <span className="text-[15px] font-medium text-white/85">Vidējais pirkums</span>
                <span className="font-mono text-[22px] font-semibold text-white">{eur(value)}</span>
              </label>
              <input id="value" type="range" min="10" max="300" step="5" value={value}
                onChange={e=>setValue(+e.target.value)} className="focus-ring"/>
            </div>

            <p className="mt-7 pt-6 border-t border-white/10 font-mono text-[14px] text-white/55">
              {calls} zvani × {eur(value)} = <span className="text-loss-line font-semibold">{eur(perDay)}</span> dienā
            </p>
          </div>

          {/* Rezultāts */}
          <div className="rounded-3xl bg-loss-light border-2 border-loss p-6 sm:p-8 text-ink flex flex-col justify-center">
            <p className="text-[12px] font-mono uppercase tracking-[0.12em] text-loss font-semibold mb-2">
              Jūs zaudējat
            </p>

            <p className="display text-[48px] sm:text-[64px] leading-none font-extrabold text-loss tabular-nums">
              {eur(perDay)}
            </p>
            <p className="text-[15px] text-ink-muted mt-1">katru dienu</p>

            <div className="mt-7 pt-6 border-t border-loss-line grid grid-cols-2 gap-4">
              <div>
                <p className="font-mono text-[24px] font-semibold text-ink tabular-nums">{eur(perMonth)}</p>
                <p className="text-[13px] text-ink-muted">mēnesī</p>
              </div>
              <div>
                <p className="font-mono text-[24px] font-semibold text-ink tabular-nums">{eur(perYear)}</p>
                <p className="text-[13px] text-ink-muted">gadā</p>
              </div>
            </div>

            <p className="mt-6 text-[14px] leading-relaxed text-ink-muted">
              Cognityl uzturēšana maksā <strong className="text-ink font-semibold">no 150 € mēnesī</strong> —
              mazāk nekā {perMonth > 0 ? Math.max(1, Math.round(perMonth/150)) : 1}× lētāk par to, ko jūs
              zaudējat neatbildētos zvanos.
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════
   KĀ TAS STRĀDĀ — reāla secība, tāpēc numuri ir pamatoti
   ══════════════════════════════════════════════════════ */
function HowItWorks(){
  const steps = [
    { icon:'phone',    title:'Klients piezvana',
      text:'AI atbild nekavējoties — jau pirmajās sekundēs — un automātiski atpazīst valodu: latviešu, krievu vai angļu.' },
    { icon:'globe',    title:'Sniedz atbildes',

/* ══════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════ */
function StickyCallBar(){
  const [show,setShow] = useState(false);

  useEffect(()=>{
    const onScroll = () => setShow(window.scrollY > 420);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return () => window.removeEventListener('scroll', onScroll);
  },[]);

  return (
    <div className={`md:hidden fixed bottom-0 inset-x-0 z-50 p-3 bg-white/95 backdrop-blur border-t border-line
      transition-transform duration-300 ${show ? "translate-y-0" : "translate-y-full"}`}>
      <a href={callHref}
         className="flex items-center justify-center gap-2.5 w-full rounded-full bg-brand text-white
           py-4 text-[16px] font-semibold active:scale-[.98] transition focus-ring shadow-lg shadow-brand/25">
        <Icon name="phone" className="w-5 h-5"/>
        Zvanīt AI asistentam tūlīt
      </a>
    </div>
  );
}
