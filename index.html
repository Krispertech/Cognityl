<style>
  :root{
    --bg:#ffffff;
    --ink:#101412;
    --muted:#66736d;
    --soft:#f6f8f5;
    --soft-2:#eef5ee;
    --line:#c9d0c4;
    --green:#13944a;
    --green-dark:#0e6f37;
    --green-light:#dff5e6;
    --blue:#1d6fff;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;}
  .font-display{font-family:'IBM Plex Sans',sans-serif;letter-spacing:-0.03em;}
  .font-mono{font-family:'IBM Plex Mono',monospace;}
  .glass{background:rgba(255,255,255,.84);backdrop-filter:blur(18px);}
  .grid-bg{background-image:linear-gradient(to right, rgba(16,20,18,.06) 1px, transparent 1px),linear-gradient(to bottom, rgba(16,20,18,.06) 1px, transparent 1px);background-size:44px 44px;}
  .gradient-text{background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .shadow-soft{box-shadow:4px 4px 0 rgba(16,20,18,.9);}
  .card{border:1.5px solid var(--line);background:#fff;border-radius:0px;transition:.15s ease;}
  .card:hover{border-color:var(--ink);box-shadow:3px 3px 0 rgba(16,20,18,.9);}
  .focus-ring:focus-visible{outline:3px solid var(--green-light);outline-offset:3px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .7s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

function Nav(){

  <div className="w-9 h-9 rounded-none bg-[#1F8B41] text-white flex items-center justify-center font-display text-lg font-bold">
    C
  </div>
  <span className="font-display text-xl font-bold tracking-tight text-[var(--ink)]">
    Cognityl
  </span>
      </a>
      <nav className="hidden md:flex items-center gap-8 text-sm text-[var(--muted)]">
        {links.map(([label,id])=><a key={id} href={`#${id}`} className="hover:text-[var(--ink)] transition focus-ring rounded-none">{label}</a>)}

      <div className="hidden md:flex items-center gap-5">
        <a href="#contact" className="text-sm text-[var(--muted)] hover:text-[var(--ink)] transition focus-ring rounded-none">Analyze my business</a>

      </div>
      <button className="md:hidden focus-ring rounded-none" onClick={()=>setOpen(!open)} aria-label="Toggle menu">☰</button>

    {open && <div className="md:hidden px-5 py-4 border-t border-[var(--line)] bg-white flex flex-col gap-4">

}

function CertStrip(){
  const certs=[
    ['SOC2','SOC 2 Type II','In progress'],
    ['ISO','ISO 27001','In progress'],

    ['VPC','Private deployment','VPC & on-prem options'],

  return <div className="flex flex-wrap gap-0 rounded-none border border-[var(--line)] bg-white overflow-hidden">
    {certs.map(([tag,title,sub],i)=><div key={tag} className={`flex items-center gap-3 px-5 py-4 flex-1 min-w-[180px] ${i>0?'border-l border-[var(--line)]':''}`}>
      <span className="w-9 h-9 rounded-full border border-[var(--green)] text-[var(--green)] flex items-center justify-center font-mono text-[9px] font-semibold flex-shrink-0">{tag}</span>
      <div className="leading-tight">
        <p className="font-semibold text-sm">{title}</p>
        <p className="text-xs text-[var(--muted)]">{sub}</p>
      </div>
    </div>)}
  </div>
}

function Hero(){
  return <section id="top" className="relative pt-36 lg:pt-44 pb-20 lg:pb-28 grid-bg overflow-hidden">
    <div className="relative max-w-7xl mx-auto px-5 lg:px-8 grid lg:grid-cols-[1.05fr_.95fr] gap-12 items-center">
      <div className="fade-up">
        <div className="inline-flex items-center gap-2 rounded-none border border-[var(--line)] bg-white px-4 py-2 text-sm text-[var(--muted)] mb-7 shadow-soft">
          <Icon name="spark" className="w-4 h-4 text-[var(--green)]"/> AI opportunity discovery for modern businesses

        <h1 className="font-display text-5xl sm:text-6xl lg:text-7xl font-bold tracking-[-.055em] leading-[.95] max-w-3xl">
          Find the AI opportunities your competitors haven’t.

        <p className="mt-7 text-lg lg:text-xl text-[var(--muted)] leading-relaxed max-w-2xl">

          <a href="#security" className="inline-flex items-center justify-center rounded-none bg-white border border-[var(--line)] px-7 py-4 font-semibold hover:border-[var(--green)] transition focus-ring">See how it works</a>

        <p className="mt-4 text-sm text-[var(--muted)]">Start with a focused report: what to automate first, why it matters, and how to test it safely.</p>

        <div className="mt-8">
          <CertStrip/>
        </div>
      </div>
      <div className="relative fade-up" style={{animationDelay:'.15s'}}>
        <div className="card shadow-soft p-5 lg:p-7">
          <div className="flex items-center justify-between mb-5">
            <div>
              <p className="text-sm text-[var(--muted)]">Discovery Engine</p>

            <span className="w-12 h-12 rounded-none bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center"><Icon name="spark"/></span>

            <div className="flex-1"><h4 className="font-semibold">{r[0]}</h4><p className="text-sm text-[var(--muted)] mt-1">{r[1]}</p></div>
            <span className="hidden sm:block text-xs bg-white border border-[var(--line)] rounded-none px-3 py-1 text-[var(--green-dark)]">{r[2]}</span>
          </div>)}
        </div>
      </div>
    </div>
  </section>
}

function Report(){
  const findings=[
    ['Website intelligence','32 pages, 4 forms, 1 catalogue mapped','Complete'],
    ['AI readiness score','Based on funnel structure, response signals, tooling','74/100'],
    ['Problem map','3 visible gaps in sales and support flow','3 found'],

            <span className="w-2.5 h-2.5 bg-[var(--line)]"></span>
            <span className="w-2.5 h-2.5 bg-[var(--line)]"></span>
            <span className="w-2.5 h-2.5 bg-[var(--line)]"></span>
          </div>
          <span className="font-mono text-[10px] uppercase tracking-[0.08em] text-[var(--muted)]">Sample AI Opportunity Report · Illustrative</span>

function Engine(){

    ['chart','Problem Detection','Flags visible bottlenecks such as weak lead capture, missing support automation, slow quote flows or complex product discovery.'],

    ['doc','Report Generation','Creates a clear AI Opportunity Report with findings, recommended automations and a practical first-step roadmap.'],

  return <section id="engine" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">

      </div>
      <div className="card p-7 shadow-soft bg-[var(--soft)]">
        <p className="font-mono text-xs uppercase tracking-[0.08em] text-[var(--muted)] mb-5">Engine workflow</p>

function UseCases(){

    ['For sales teams','Qualify inbound leads, write follow-ups, summarize calls and update CRM fields automatically.'],
    ['For support teams','Answer common customer questions, route urgent requests and create support summaries.'],

function Preview(){

function Process(){

function DataPolicy(){
  const [optOutSent,setOptOutSent]=useState(false);
  const [optOutError,setOptOutError]=useState(false);

  const handleOptOutSubmit = async (event) => {
    event.preventDefault();
    setOptOutError(false);

    const form = event.currentTarget;
    const formData = new FormData(form);

    try {
      const response = await fetch(form.action, {
        method: "POST",
        body: formData,
        headers: { Accept: "application/json" }
      });

      if (response.ok) {
        form.reset();
        setOptOutSent(true);
      } else {
        setOptOutError(true);
      }
    } catch (error) {
      setOptOutError(true);
    }
  };

  const items=[
    ['scan','Public sources only','The Discovery Engine reads what a person could already see by visiting your website: pages, forms, catalogues, FAQs and published content. It does not access private systems, logins or internal data.'],
    ['users','No personal or sensitive data','We look for business signals — site structure, content, funnel gaps — not personal details about individuals. Business contact information used for outreach is limited to what a company has published publicly.'],
    ['shield','GDPR / CCPA aligned by design','Our data-handling practices follow GDPR and CCPA principles: data is used only for the stated purpose, kept only as long as necessary, and never sold to third parties.'],
    ['pause','You can opt out anytime',"If you'd rather your business website not be scanned or included in outreach, submit the form below and we'll exclude your domain and remove any related records — no back and forth required."],
  ];
  return <section id="data-policy" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">
    <div className="max-w-2xl mb-14">
      <p className="text-[var(--green)] font-semibold mb-3">How we source data</p>
      <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">The Discovery Engine only looks at what's already public.</h2>
      <p className="mt-5 text-lg text-[var(--muted)] leading-relaxed">Since Cognityl's reports are built from public business signals, we think it matters to be specific about what that means in practice.</p>
    </div>
    <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-5">
      {items.map(([icon,title,desc])=><div key={title} className="card p-7">
        <span className="w-12 h-12 rounded-none bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center mb-6"><Icon name={icon}/></span>
        <h3 className="font-display text-lg font-bold mb-3">{title}</h3>
        <p className="text-[var(--muted)] text-sm leading-relaxed">{desc}</p>
      </div>)}
    </div>

    <div className="mt-5 bg-[var(--soft)] border border-[var(--line)] p-7 grid lg:grid-cols-[.85fr_1.15fr] gap-7 items-start">
      <div>
        <h3 className="font-display text-2xl font-bold tracking-tight mb-3">Request opt-out</h3>
        <p className="text-sm text-[var(--muted)] leading-relaxed">Want your domain excluded from scans and outreach, or want to see what information we hold about your business? Submit this request and we’ll handle it manually from your Formspree email.</p>
      </div>

      {optOutSent ? (
        <div className="bg-white border border-[var(--line)] p-6">
          <div className="mb-4 w-12 h-12 rounded-full bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center"><Icon name="check"/></div>
          <h4 className="font-display text-xl font-bold mb-2">Request received</h4>
          <p className="text-sm text-[var(--muted)] leading-relaxed">Thank you. Your opt-out request has been submitted.</p>
          <button onClick={()=>setOptOutSent(false)} className="mt-5 inline-flex items-center gap-2 rounded-none border border-[var(--line)] px-4 py-2 text-sm font-semibold hover:border-[var(--green)] transition focus-ring">Submit another request</button>
        </div>
      ) : (
        <form
          action="https://formspree.io/f/mwvdrvdw"
          method="POST"
          onSubmit={handleOptOutSubmit}
          className="bg-white border border-[var(--line)] p-6 space-y-4"
        >
          <input type="hidden" name="_subject" value="Cognityl Opt-Out Request" />

          <div className="grid sm:grid-cols-2 gap-4">
            <label className="block text-sm font-semibold">
              Domain to exclude
              <input
                required
                name="domain"
                placeholder="example.com"
                className="mt-2 w-full rounded-none border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)] font-normal"
              />
            </label>

            <label className="block text-sm font-semibold">
              Your email
              <input
                required
                name="email"
                type="email"
                placeholder="you@company.com"
                className="mt-2 w-full rounded-none border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)] font-normal"
              />
            </label>
          </div>

          <label className="block text-sm font-semibold">
            Request type
            <select
              name="request_type"
              required
              className="mt-2 w-full rounded-none border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)] font-normal"
            >
              <option value="exclude_from_scans">Exclude this domain from scans</option>
              <option value="show_data_held">Show what data is held</option>
              <option value="both">Both</option>
            </select>
          </label>

          <label className="block text-sm font-semibold">
            Optional message
            <textarea
              name="message"
              rows="4"
              placeholder="Add any extra details here..."
              className="mt-2 w-full rounded-none border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)] resize-none font-normal"
            ></textarea>
          </label>

          {optOutError && <p className="text-sm text-red-700">Something went wrong. Please try again or email us directly.</p>}

          <button className="w-full rounded-none bg-[var(--green)] text-white font-semibold px-6 py-4 hover:bg-[var(--green-dark)] transition">Submit opt-out request</button>
        </form>
      )}
    </div>
  </section>
}
