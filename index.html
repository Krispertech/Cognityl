<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com 'unsafe-inline' 'unsafe-eval';
  style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
  font-src https://fonts.gstatic.com;
  img-src 'self' data: https:;
  connect-src 'self';
  frame-ancestors 'none';
  base-uri 'self';
 form-action 'self' https://formspree.io;
">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cognityl — Practical AI Solutions for Growing Businesses</title>
<meta name="description" content="Cognityl builds AI assistants, workflow automations, and data intelligence tools that help businesses save time, convert more leads, and make faster decisions." />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#101412;
    --muted:#66736d;
    --soft:#f6f8f5;
    --soft-2:#eef5ee;
    --line:#e3e8df;
    --green:#13944a;
    --green-dark:#0e6f37;
    --green-light:#dff5e6;
    --blue:#1d6fff;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;overflow-x:hidden;}
  .font-display{font-family:'Inter Tight',sans-serif;}
  .glass{background:rgba(255,255,255,.84);backdrop-filter:blur(18px);}
  .grid-bg{background-image:linear-gradient(to right, rgba(16,20,18,.06) 1px, transparent 1px),linear-gradient(to bottom, rgba(16,20,18,.06) 1px, transparent 1px);background-size:44px 44px;}
  .gradient-text{background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .shadow-soft{box-shadow:0 24px 80px rgba(15, 92, 44, .10);}
  .card{border:1px solid var(--line);background:#fff;border-radius:24px;transition:.22s ease;}
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 48px rgba(16,20,18,.08);border-color:#cbd8ca;}
  .focus-ring:focus-visible{outline:3px solid var(--green-light);outline-offset:3px;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .float{animation:float 4s ease-in-out infinite;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .fade-up{animation:fadeUp .7s ease both;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState} = React;

const Icon = ({name, className="w-5 h-5"}) => {
  const icons = {
    spark:"M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8L12 2zM19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8L19 16z",
    bot:"M12 8V4m-5 8h10M7 12a5 5 0 0 0 10 0v-1a5 5 0 0 0-10 0v1zm-3 1v2m16-2v2M9 15h.01M15 15h.01",
    flow:"M4 7h6v6H4V7zm10-3h6v6h-6V4zm0 10h6v6h-6v-6zM10 10h4M10 13l4 4",
    chart:"M4 19V5m0 14h16M8 15l3-3 3 2 5-7",
    shield:"M12 3l8 4v5c0 5-3.4 8.7-8 9-4.6-.3-8-4-8-9V7l8-4z",
    arrow:"M5 12h14m-6-6l6 6-6 6",
    check:"M20 6L9 17l-5-5",
    mail:"M4 6h16v12H4V6zm0 0l8 7 8-7",
    users:"M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm13 10v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75",
    plug:"M12 22v-5M9 8V2m6 6V2M7 8h10v4a5 5 0 0 1-10 0V8z",
    clock:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm0-14v5l3 2",
  };
  return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={icons[name]} /></svg>;
};

function Nav(){
  const [open,setOpen]=useState(false);
  const links=[['Solutions','solutions'],['Process','process'],['Use cases','use-cases'],['FAQ','faq']];
  return <header className="fixed top-0 inset-x-0 z-50 border-b border-[var(--line)] glass">
    <div className="max-w-7xl mx-auto px-5 lg:px-8 h-16 flex items-center justify-between">
      <a href="#top" className="flex items-center gap-2 focus-ring rounded-lg">
        <span className="w-9 h-9 rounded-xl bg-[var(--ink)] text-white flex items-center justify-center font-display font-bold">C</span>
        <span className="font-display font-bold text-xl tracking-tight">Cognityl</span>
      </a>
      <nav className="hidden md:flex items-center gap-8 text-sm text-[var(--muted)]">
        {links.map(([label,id])=><a key={id} href={`#${id}`} className="hover:text-[var(--ink)] transition focus-ring rounded">{label}</a>)}
      </nav>
      <a href="#contact" className="hidden md:inline-flex items-center gap-2 rounded-full bg-[var(--ink)] text-white px-5 py-2.5 text-sm font-semibold hover:bg-[var(--green-dark)] transition focus-ring">Book free call <Icon name="arrow" className="w-4 h-4"/></a>
      <button className="md:hidden focus-ring rounded" onClick={()=>setOpen(!open)} aria-label="Toggle menu">☰</button>
    </div>
    {open && <div className="md:hidden px-5 py-4 border-t border-[var(--line)] bg-white flex flex-col gap-4">
      {links.map(([label,id])=><a key={id} href={`#${id}`} onClick={()=>setOpen(false)}>{label}</a>)}
      <a href="#contact" onClick={()=>setOpen(false)} className="font-semibold">Book free call →</a>
    </div>}
  </header>
}

function Hero(){
  return <section id="top" className="relative pt-36 lg:pt-44 pb-20 lg:pb-28 grid-bg overflow-hidden">
    <div className="absolute -top-24 right-[-8rem] w-[34rem] h-[34rem] rounded-full bg-[var(--green-light)] blur-3xl opacity-70" />
    <div className="relative max-w-7xl mx-auto px-5 lg:px-8 grid lg:grid-cols-[1.05fr_.95fr] gap-12 items-center">
      <div className="fade-up">
        <div className="inline-flex items-center gap-2 rounded-full border border-[var(--line)] bg-white px-4 py-2 text-sm text-[var(--muted)] mb-7 shadow-soft">
          <Icon name="spark" className="w-4 h-4 text-[var(--green)]"/> Practical AI solutions for modern teams
        </div>
        <h1 className="font-display text-5xl sm:text-6xl lg:text-7xl font-bold tracking-[-.045em] leading-[.95] max-w-3xl">
          Turn AI into real business results.
        </h1>
        <p className="mt-7 text-lg lg:text-xl text-[var(--muted)] leading-relaxed max-w-2xl">
          Cognityl builds AI assistants, workflow automations and data tools that help your team save time, qualify leads, support customers and make faster decisions.
        </p>
        <div className="mt-9 flex flex-col sm:flex-row gap-4">
          <a href="#contact" className="inline-flex items-center justify-center gap-2 rounded-full bg-[var(--green)] text-white px-7 py-4 font-semibold hover:bg-[var(--green-dark)] transition focus-ring">Book a free AI consultation <Icon name="arrow" className="w-4 h-4"/></a>
          <a href="#solutions" className="inline-flex items-center justify-center rounded-full bg-white border border-[var(--line)] px-7 py-4 font-semibold hover:border-[var(--green)] transition focus-ring">Explore solutions</a>
        </div>
        <div className="mt-8 flex flex-wrap gap-3 text-sm text-[var(--muted)]">
          {['No in-house AI team required','Fast first prototype','Built around your tools'].map(t=><span key={t} className="inline-flex items-center gap-2"><Icon name="check" className="w-4 h-4 text-[var(--green)]"/>{t}</span>)}
        </div>
      </div>
      <div className="relative fade-up" style={{animationDelay:'.15s'}}>
        <div className="card shadow-soft p-5 lg:p-7 float">
          <div className="flex items-center justify-between mb-5">
            <div>
              <p className="text-sm text-[var(--muted)]">AI Opportunity Map</p>
              <h3 className="font-display text-2xl font-bold">Where AI can help first</h3>
            </div>
            <span className="w-12 h-12 rounded-2xl bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center"><Icon name="spark"/></span>
          </div>
          {[
            ['Lead qualification','Automate intake, scoring and follow-ups','High impact'],
            ['Customer support','Answer repeated questions instantly','Save time'],
            ['Internal knowledge','Search policies, docs and SOPs with AI','Faster work'],
            ['Reporting','Turn scattered data into useful dashboards','Better decisions']
          ].map((r,i)=><div key={r[0]} className="flex gap-4 items-start p-4 rounded-2xl border border-[var(--line)] mb-3 bg-[var(--soft)]">
            <span className="w-8 h-8 rounded-full bg-white border border-[var(--line)] flex items-center justify-center text-sm font-bold">{i+1}</span>
            <div className="flex-1"><h4 className="font-semibold">{r[0]}</h4><p className="text-sm text-[var(--muted)] mt-1">{r[1]}</p></div>
            <span className="hidden sm:block text-xs bg-white border border-[var(--line)] rounded-full px-3 py-1 text-[var(--green-dark)]">{r[2]}</span>
          </div>)}
        </div>
      </div>
    </div>
  </section>
}

function Trust(){
  return <section className="py-10 border-y border-[var(--line)] bg-[var(--soft)]">
    <div className="max-w-7xl mx-auto px-5 lg:px-8 grid md:grid-cols-4 gap-6 text-center">
      {[
        ['10–30 hrs/week','of repetitive work can be automated'],
        ['24/7','AI assistants for customers or teams'],
        ['CRM + email + website','connected into one workflow'],
        ['Prototype first','so you see value before scaling']
      ].map(s=><div key={s[0]}><p className="font-display text-2xl font-bold">{s[0]}</p><p className="text-sm text-[var(--muted)] mt-1">{s[1]}</p></div>)}
    </div>
  </section>
}

function Solutions(){
  const items=[
    ['bot','AI Assistants','Customer support bots, internal knowledge assistants and sales copilots that answer questions, guide users and reduce manual work.'],
    ['flow','Workflow Automation','Automate repetitive tasks across email, CRM, spreadsheets, forms and internal tools so your team can focus on higher-value work.'],
    ['chart','Data Intelligence','Dashboards, reporting and AI-powered insights that turn messy business data into clear next steps.'],
    ['plug','AI Integrations','Connect AI to your existing tools: website, CRM, Google Workspace, Notion, Slack, databases and custom systems.'],
    ['users','Sales & Lead Systems','Lead capture, qualification, enrichment and follow-up automations designed for B2B sales teams.'],
    ['shield','AI Consulting','We identify practical AI opportunities, create a roadmap and help you launch without wasting budget on the wrong tools.'],
  ];
  return <section id="solutions" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">
    <div className="max-w-2xl mb-14">
      <p className="text-[var(--green)] font-semibold mb-3">Solutions</p>
      <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">AI that solves clear business problems.</h2>
      <p className="mt-5 text-lg text-[var(--muted)] leading-relaxed">No vague AI hype. We design systems around the exact tasks, workflows and decisions your business needs to improve.</p>
    </div>
    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
      {items.map(([icon,title,desc])=><div key={title} className="card p-7">
        <span className="w-12 h-12 rounded-2xl bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center mb-6"><Icon name={icon}/></span>
        <h3 className="font-display text-xl font-bold mb-3">{title}</h3>
        <p className="text-[var(--muted)] leading-relaxed">{desc}</p>
      </div>)}
    </div>
  </section>
}

function UseCases(){
  const cases=[
    ['For sales teams','Qualify inbound leads, write follow-ups, summarize calls and update CRM fields automatically.'],
    ['For support teams','Answer common customer questions, route urgent requests and create support summaries.'],
    ['For operations','Automate reporting, document processing, data cleanup and repetitive admin workflows.'],
    ['For founders','Identify the highest ROI AI use cases before hiring a full AI or data team.'],
  ];
  return <section id="use-cases" className="py-24 lg:py-32 bg-[var(--ink)] text-white">
    <div className="max-w-7xl mx-auto px-5 lg:px-8 grid lg:grid-cols-[.8fr_1.2fr] gap-12 items-start">
      <div>
        <p className="text-[var(--green-light)] font-semibold mb-3">Use cases</p>
        <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">Built for the teams that need speed.</h2>
        <p className="mt-5 text-white/65 leading-relaxed">Cognityl helps businesses start with one high-impact workflow, prove value, and then expand AI across the company.</p>
      </div>
      <div className="grid sm:grid-cols-2 gap-5">
        {cases.map(([title,desc])=><div key={title} className="rounded-3xl border border-white/10 bg-white/[.04] p-7">
          <h3 className="font-display text-xl font-bold mb-3">{title}</h3>
          <p className="text-white/65 leading-relaxed">{desc}</p>
        </div>)}
      </div>
    </div>
  </section>
}

function Process(){
  const steps=[
    ['01','Discover','We review your business goals, tools and repetitive workflows.'],
    ['02','Map','We identify the highest-value AI opportunities and define a simple scope.'],
    ['03','Build','We create a prototype, connect your tools and test it with real workflows.'],
    ['04','Launch','We deploy, train your team and improve the system based on usage.'],
  ];
  return <section id="process" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">
    <div className="max-w-2xl mb-14">
      <p className="text-[var(--green)] font-semibold mb-3">Process</p>
      <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">From idea to working AI system.</h2>
    </div>
    <div className="grid md:grid-cols-4 gap-5">
      {steps.map(([n,title,desc])=><div key={n} className="card p-7">
        <p className="text-sm text-[var(--green)] font-bold mb-8">{n}</p>
        <h3 className="font-display text-xl font-bold mb-3">{title}</h3>
        <p className="text-[var(--muted)] leading-relaxed">{desc}</p>
      </div>)}
    </div>
  </section>
}

function FAQ(){
  const [open,setOpen]=useState(0);
  const faqs=[
    ['Do we need technical knowledge to work with Cognityl?','No. We translate the technical side into clear business steps and handle the setup, integration and launch.'],
    ['Can you connect AI to our existing tools?','Yes. We can work with CRMs, websites, Google Workspace, spreadsheets, databases, Slack, Notion and many other tools.'],
    ['What should we automate first?','Usually the best starting point is a repetitive task with clear rules, high volume, or direct revenue impact, such as lead qualification, support replies or reporting.'],
    ['Is this only for large companies?','No. Small and growing companies can benefit most because AI can replace manual tasks before hiring more staff.'],
  ];
  return <section id="faq" className="py-24 lg:py-32 bg-[var(--soft)] border-y border-[var(--line)]">
    <div className="max-w-5xl mx-auto px-5 lg:px-8">
      <div className="text-center mb-12"><p className="text-[var(--green)] font-semibold mb-3">FAQ</p><h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">Questions clients usually ask</h2></div>
      <div className="bg-white rounded-3xl border border-[var(--line)] overflow-hidden">
        {faqs.map(([q,a],i)=><div key={q} className="border-b border-[var(--line)] last:border-b-0">
          <button onClick={()=>setOpen(open===i?-1:i)} className="w-full text-left px-6 py-5 flex items-center justify-between gap-5 focus-ring"><span className="font-semibold text-lg">{q}</span><span className="text-2xl text-[var(--green)]">{open===i?'−':'+'}</span></button>
          {open===i && <p className="px-6 pb-6 text-[var(--muted)] leading-relaxed">{a}</p>}
        </div>)}
      </div>
    </div>
  </section>
}

function Contact(){
  const [sent,setSent]=useState(false);
  return <section id="contact" className="py-24 lg:py-32 max-w-7xl mx-auto px-5 lg:px-8">
    <div className="rounded-[2rem] bg-[var(--ink)] text-white p-8 lg:p-14 grid lg:grid-cols-2 gap-10 items-start overflow-hidden relative">
      <div className="absolute right-[-8rem] top-[-8rem] w-96 h-96 bg-[var(--green)] rounded-full blur-3xl opacity-30" />
      <div className="relative">
        <p className="text-[var(--green-light)] font-semibold mb-3">Start with a free consultation</p>
        <h2 className="font-display text-4xl lg:text-5xl font-bold tracking-tight">Let's find where AI can create value for your business.</h2>
        <p className="mt-5 text-white/65 leading-relaxed max-w-md">Tell us what you want to improve. We'll suggest practical AI solutions and the fastest way to test them.</p>
        <div className="mt-8 space-y-3 text-white/80">
          {['Clear use-case recommendations','No generic sales pitch','Prototype-focused approach'].map(t=><p key={t} className="flex items-center gap-3"><Icon name="check" className="w-5 h-5 text-[var(--green-light)]"/>{t}</p>)}
        </div>
      </div>
      <div className="relative bg-white text-[var(--ink)] rounded-3xl p-6 lg:p-8">
        {sent ? <div className="py-16 text-center"><div className="mx-auto mb-5 w-14 h-14 rounded-full bg-[var(--green-light)] text-[var(--green)] flex items-center justify-center"><Icon name="check"/></div><h3 className="font-display text-2xl font-bold">Message sent</h3><p className="text-[var(--muted)] mt-2">We'll get back to you soon.</p></div> :
       <form
  action="https://formspree.io/f/mwvdrvdw"
  method="POST"
  className="space-y-4"
>
          <div className="grid sm:grid-cols-2 gap-4">
           <input
  required
  name="name"
  placeholder="Your name"
  className="rounded-2xl border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)]"
/>
            <input
  required
  name="email"
  type="email"
  placeholder="Work email"
  className="rounded-2xl border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)]"
/>
          </div>
         <input
  name="website"
  placeholder="Company website"
  className="w-full rounded-2xl border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)]"
/>
          <select
  name="service"
  className="w-full rounded-2xl border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)]"
            <option>I want to automate workflows</option><option>I need an AI assistant/chatbot</option><option>I need sales/lead automation</option><option>I need data dashboards/insights</option><option>I'm not sure yet</option>
          </select>
         <textarea
  name="message"
  rows="4"
  placeholder="What would you like AI to help with?"
  className="w-full rounded-2xl border border-[var(--line)] px-4 py-3 outline-none focus:border-[var(--green)] resize-none"
></textarea>
          <button className="w-full rounded-2xl bg-[var(--green)] text-white font-semibold px-6 py-4 hover:bg-[var(--green-dark)] transition">Send request</button>
        </form>}
      </div>
    </div>
  </section>
}

function Footer(){
  return <footer className="border-t border-[var(--line)] py-10">
    <div className="max-w-7xl mx-auto px-5 lg:px-8 flex flex-col md:flex-row justify-between gap-6 text-sm text-[var(--muted)]">
      <div><div className="flex items-center gap-2 mb-3"><span className="w-8 h-8 rounded-xl bg-[var(--ink)] text-white flex items-center justify-center font-bold">C</span><span className="font-display text-lg font-bold text-[var(--ink)]">Cognityl</span></div><p>Practical AI solutions for growing businesses.</p></div>
      <div className="flex flex-wrap gap-5"><a href="#solutions">Solutions</a><a href="#process">Process</a><a href="#use-cases">Use cases</a><a href="#contact">Contact</a></div>
    </div>
  </footer>
}

function App(){return <><Nav/><main><Hero/><Trust/><Solutions/><UseCases/><Process/><FAQ/><Contact/></main><Footer/></>}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
